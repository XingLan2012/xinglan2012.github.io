<!-- 碎星之列 + 下拉面板 -->
<style>
  /* ========== 冰晶吊坠 ========== */
  .crystal-pendant {
    position: fixed;
    top: 16px;
    left: 16px;
    z-index: 9999;
    width: 42px; height: 42px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.4s ease, opacity 0.3s ease;
    user-select: none;
    opacity: 0.7;
  }
  .crystal-pendant:hover {
    transform: scale(1.15) rotate(-10deg);
    opacity: 1;
  }
  .crystal-pendant.open {
    transform: rotate(180deg) scale(0.9);
    opacity: 0.5;
  }

  .crystal-pendant svg {
    width: 36px; height: 36px;
    filter: drop-shadow(0 0 12px rgba(255, 215, 0, 0.3)) drop-shadow(0 0 30px rgba(255, 215, 0, 0.1));
    animation: crystalGlow 3s ease-in-out infinite;
  }
  @keyframes crystalGlow {
    0%, 100% { filter: drop-shadow(0 0 8px rgba(255, 215, 0, 0.25)) drop-shadow(0 0 20px rgba(200, 180, 100, 0.1)); }
    50% { filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.5)) drop-shadow(0 0 50px rgba(255, 215, 0, 0.2)); }
  }

  /* ========== 下拉面板 ========== */
  .crystal-panel {
    position: fixed;
    top: 0; left: 0;
    width: 280px;
    height: 100vh;
    z-index: 9998;
    background: rgba(8, 12, 35, 0.92);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-right: 1px solid rgba(255, 215, 0, 0.08);
    box-shadow: 4px 0 40px rgba(0,0,0,0.4), 0 0 60px rgba(255,215,0,0.03);
    transform: translateX(-100%);
    transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  .crystal-panel.open {
    transform: translateX(0);
  }

  .crystal-panel::-webkit-scrollbar { width: 2px; }
  .crystal-panel::-webkit-scrollbar-track { background: transparent; }
  .crystal-panel::-webkit-scrollbar-thumb { background: rgba(255,215,0,0.15); border-radius: 2px; }

  /* 面板头部 */
  .crystal-panel-header {
    padding: 24px 20px 16px;
    border-bottom: 1px solid rgba(100, 200, 255, 0.06);
  }
  .crystal-panel-title {
    font-size: 14px;
    color: rgba(100, 200, 255, 0.7);
    letter-spacing: 4px;
    font-weight: 300;
  }
  .crystal-panel-subtitle {
    font-size: 11px;
    color: rgba(100, 200, 255, 0.25);
    margin-top: 6px;
    letter-spacing: 2px;
  }

  /* 导航链接 */
  .crystal-nav {
    flex: 1;
    padding: 12px 0;
  }
  .crystal-nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 20px;
    color: rgba(255, 255, 255, 0.55);
    font-size: 13px;
    text-decoration: none;
    transition: all 0.25s ease;
    letter-spacing: 1px;
    border-left: 2px solid transparent;
  }
  .crystal-nav-item:hover {
    color: rgba(100, 200, 255, 0.85);
    background: rgba(100, 200, 255, 0.04);
    border-left-color: rgba(100, 200, 255, 0.3);
  }
  .crystal-nav-item .nav-icon {
    font-size: 16px;
    width: 24px;
    text-align: center;
    opacity: 0.6;
  }

  /* 面板底部 */
  .crystal-panel-footer {
    padding: 16px 20px;
    border-top: 1px solid rgba(100, 200, 255, 0.06);
    font-size: 11px;
    color: rgba(100, 200, 255, 0.15);
    letter-spacing: 1px;
    text-align: center;
  }

  /* 遮罩层 */
  .crystal-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 9997;
    background: rgba(0, 0, 0, 0.35);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }
  .crystal-overlay.open {
    opacity: 1;
    pointer-events: auto;
  }

  /* 页面主体右移（可选，增加沉浸感） */
  body.crystal-open .root {
    transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
  }
</style>

<!-- 遮罩 -->
<div class="crystal-overlay" id="crystalOverlay"></div>

<!-- 碎星之列 SVG -->

<script>
(function() {
  var pendant = document.getElementById('crystalPendant');
  var panel = document.getElementById('crystalPanel');
  var overlay = document.getElementById('crystalOverlay');

  function openCrystal() {
    panel.classList.add('open');
    overlay.classList.add('open');
    pendant.classList.add('open');
    document.body.classList.add('crystal-open');
  }

  function closeCrystal() {
    panel.classList.remove('open');
    overlay.classList.remove('open');
    pendant.classList.remove('open');
    document.body.classList.remove('crystal-open');
  }

  pendant.addEventListener('click', function(e) {
    e.stopPropagation();
    if (panel.classList.contains('open')) {
      closeCrystal();
    } else {
      openCrystal();
    }
  });

  overlay.addEventListener('click', closeCrystal);

  // 按 Esc 关闭
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && panel.classList.contains('open')) {
      closeCrystal();
    }
  });
})();
</script>
