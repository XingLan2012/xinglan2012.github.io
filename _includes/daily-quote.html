<!-- 每日一言 - 左下角 -->
<style>
  #daily-quote {
    position: fixed;
    bottom: 20px;
    left: 20px;
    z-index: 999;
    font-size: 14px;
    color: rgba(255, 255, 255, 0.9);
    background: rgba(0, 0, 0, 0.35);
    backdrop-filter: blur(8px);
    padding: 10px 18px;
    border-radius: 30px;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
    max-width: 360px;
    line-height: 1.5;
    pointer-events: none;
    font-family: "Georgia", serif;
    font-style: italic;
    letter-spacing: 0.3px;
    transition: opacity 0.5s;
  }
  #daily-quote .author {
    font-style: normal;
    font-size: 12px;
    opacity: 0.85;
    margin-left: 6px;
  }
  @media (max-width: 600px) {
    #daily-quote {
      font-size: 12px;
      max-width: 200px;
      bottom: 12px;
      left: 12px;
      padding: 6px 12px;
    }
  }
</style>

<div id="daily-quote">✨ 加载中...</div>

<script>
  (function() {
    const container = document.getElementById('daily-quote');
    fetch('https://v1.hitokoto.cn/?c=i')
      .then(response => response.json())
      .then(data => {
        if (data.hitokoto) {
          let html = data.hitokoto;
          if (data.from_who) {
            html += `<span class="author">—— ${data.from_who}</span>`;
          } else if (data.from) {
            html += `<span class="author">—— ${data.from}</span>`;
          }
          container.innerHTML = html;
        } else {
          container.textContent = '🌿 行到水穷处，坐看云起时。';
        }
      })
      .catch(() => {
        const fallbackQuotes = [
          '行到水穷处，坐看云起时。',
          '愿此行，终抵群星。',
          '万物皆有裂痕，那是光照进来的地方。',
          '生活不是等待暴风雨过去，而是学会在雨中跳舞。'
        ];
        const idx = Math.floor(Math.random() * fallbackQuotes.length);
        container.textContent = '✨ ' + fallbackQuotes[idx];
      });
  })();
</script>
