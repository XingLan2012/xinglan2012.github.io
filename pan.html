---
layout: default
title: 云盘
---

<style>
  .pan-wrap {
    max-width: 900px;
    margin: 0 auto;
    padding: 20px;
  }
  .pan-title {
    font-size: 22px;
    color: #ffd700;
    letter-spacing: 6px;
    font-weight: 300;
    margin-bottom: 4px;
  }
  .pan-sub {
    font-size: 12px;
    color: rgba(255,215,0,0.3);
    letter-spacing: 3px;
    margin-bottom: 20px;
  }

  /* 文件列表 */
  .pan-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 12px;
  }
  .pan-table th {
    padding: 10px 14px;
    text-align: left;
    font-size: 11px;
    color: rgba(255,215,0,0.3);
    letter-spacing: 2px;
    font-weight: 400;
    border-bottom: 1px solid rgba(255,215,0,0.06);
  }
  .pan-table td {
    padding: 10px 14px;
    font-size: 13px;
    color: rgba(255,255,255,0.65);
    border-bottom: 1px solid rgba(255,255,255,0.03);
    transition: background 0.2s;
  }
  .pan-table tr:hover td {
    background: rgba(255,215,0,0.02);
  }
  .pan-table .file-name {
    color: rgba(255,255,255,0.75);
    font-weight: 400;
    letter-spacing: 1px;
  }
  .pan-table .file-size {
    font-size: 11px;
    color: rgba(255,255,255,0.25);
    font-family: monospace;
  }

  /* 按钮 */
  .pan-actions { white-space: nowrap; }
  .pan-btn {
    padding: 4px 14px;
    border-radius: 14px;
    border: 1px solid;
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.25s ease;
    background: transparent;
    font-family: inherit;
  }
  .pan-btn.dl {
    color: rgba(255,215,0,0.5);
    border-color: rgba(255,215,0,0.15);
  }
  .pan-btn.dl:hover {
    color: #ffd700;
    border-color: rgba(255,215,0,0.35);
    background: rgba(255,215,0,0.04);
  }
  .pan-btn.mirror {
    color: rgba(100,200,255,0.45);
    border-color: rgba(100,200,255,0.12);
    margin-left: 6px;
  }
  .pan-btn.mirror:hover {
    color: rgba(100,200,255,0.7);
    border-color: rgba(100,200,255,0.25);
    background: rgba(100,200,255,0.03);
  }
  .pan-btn.mirror.active {
    color: rgba(100,200,255,0.7);
    border-color: rgba(100,200,255,0.2);
    background: rgba(100,200,255,0.04);
  }

  /* 测速面板 */
  .mirror-panel {
    margin-top: 8px;
    padding: 10px 14px;
    background: rgba(100,200,255,0.02);
    border: 1px solid rgba(100,200,255,0.06);
    border-radius: 8px;
    display: none;
  }
  .mirror-panel.open { display: block; }
  .mirror-panel-title {
    font-size: 10px;
    color: rgba(100,200,255,0.25);
    letter-spacing: 2px;
    margin-bottom: 6px;
  }
  .mirror-item {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin: 3px 6px 3px 0;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 11px;
    background: rgba(100,200,255,0.03);
    border: 1px solid rgba(100,200,255,0.06);
    transition: all 0.2s;
  }
  .mirror-item:hover {
    background: rgba(100,200,255,0.06);
    border-color: rgba(100,200,255,0.12);
  }
  .mirror-item a {
    color: rgba(100,200,255,0.6);
    text-decoration: none;
  }
  .mirror-item a:hover { color: rgba(100,200,255,0.85); }
  .mirror-item .latency {
    font-size: 10px;
    font-family: monospace;
  }
  .mirror-item .latency.fast { color: rgba(100,200,150,0.6); }
  .mirror-item .latency.slow { color: rgba(200,100,100,0.5); }

  .mirror-loading {
    font-size: 11px;
    color: rgba(255,255,255,0.25);
  }

  /* 状态 */
  .pan-status {
    font-size: 12px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .pan-empty {
    text-align: center;
    padding: 60px 20px;
    color: rgba(255,215,0,0.15);
    letter-spacing: 3px;
    font-size: 13px;
  }
  .pan-error {
    text-align: center;
    padding: 40px 20px;
    color: rgba(255,100,100,0.3);
    letter-spacing: 2px;
    font-size: 12px;
  }

  /* 刷新按钮 */
  .pan-refresh {
    display: inline-block;
    padding: 6px 18px;
    border: 1px solid rgba(255,215,0,0.1);
    border-radius: 16px;
    color: rgba(255,215,0,0.3);
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
    background: transparent;
    transition: all 0.25s;
    font-family: inherit;
    margin-bottom: 12px;
  }
  .pan-refresh:hover {
    border-color: rgba(255,215,0,0.2);
    color: rgba(255,215,0,0.5);
  }

  @media (max-width: 600px) {
    .pan-table th:nth-child(2),
    .pan-table td:nth-child(2) { display: none; }
    .pan-actions { white-space: normal; }
    .pan-btn { margin-bottom: 4px; }
  }
</style>

<div class="pan-wrap">
  <div class="pan-title">✦ 云盘</div>
  <div class="pan-sub"><code>/pan</code> 目录中的文件</div>

  <div id="panToolbar"></div>
  <div id="panFileList"><p class="pan-status">✦ 加载中...</p></div>
</div>

<script>
(function() {
  var REPO = 'XingLan2012/xinglan2012.github.io';
  var PAN = 'pan';
  var CACHE_KEY = 'pan_filelist_cache';
  var CACHE_TTL = 5 * 60 * 1000; // 5 分钟缓存

  var MIRRORS = [
    { name: 'GitHub Raw', url: function(f) { return 'https://raw.githubusercontent.com/' + REPO + '/main/' + PAN + '/' + f; } },
    { name: 'jsDelivr CDN', url: function(f) { return 'https://cdn.jsdelivr.net/gh/' + REPO + '@main/' + PAN + '/' + f; } },
    { name: 'ghproxy', url: function(f) { return 'https://ghproxy.com/https://raw.githubusercontent.com/' + REPO + '/main/' + PAN + '/' + f; } },
    { name: 'FastGit', url: function(f) { return 'https://raw.fastgit.org/' + REPO + '/main/' + PAN + '/' + f; } }
  ];

  var listEl = document.getElementById('panFileList');
  var toolbarEl = document.getElementById('panToolbar');

  function fmtSize(bytes) {
    if (!bytes || bytes === 0) return '';
    var u = ['B','KB','MB','GB'];
    var i = 0;
    var s = bytes;
    while (s >= 1024 && i < 3) { s /= 1024; i++; }
    return s.toFixed(i > 0 ? 1 : 0) + ' ' + u[i];
  }

  function getCached() {
    try {
      var raw = localStorage.getItem(CACHE_KEY);
      if (!raw) return null;
      var data = JSON.parse(raw);
      if (Date.now() - data.time > CACHE_TTL) return null;
      return data.files;
    } catch(e) { return null; }
  }

  function setCache(files) {
    try {
      localStorage.setItem(CACHE_KEY, JSON.stringify({ time: Date.now(), files: files }));
    } catch(e) {}
  }

  async function fetchFiles(force) {
    if (!force) {
      var cached = getCached();
      if (cached) return cached;
    }
    var url = 'https://api.github.com/repos/' + REPO + '/contents/' + PAN;
    var resp = await fetch(url);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    var data = await resp.json();
    var files = data.filter(function(i) { return i.type === 'file'; }).map(function(i) {
      return { name: i.name, size: i.size, url: i.download_url };
    });
    setCache(files);
    return files;
  }

  function fmtDate() {
    var d = new Date();
    return d.getFullYear() + '-' + ('0'+(d.getMonth()+1)).slice(-2) + '-' + ('0'+d.getDate()).slice(-2)
         + ' ' + ('0'+d.getHours()).slice(-2) + ':' + ('0'+d.getMinutes()).slice(-2);
  }

  async function measure(url) {
    var start = performance.now();
    try {
      await fetch(url, { method: 'HEAD', mode: 'no-cors' });
      return performance.now() - start;
    } catch(e) {
      // 如果 HEAD 失败，尝试 GET 但只请求第一个字节
      try {
        var c = new AbortController();
        setTimeout(function() { c.abort(); }, 3000);
        start = performance.now();
        await fetch(url, { method: 'GET', signal: c.signal });
        return performance.now() - start;
      } catch(e2) {
        return Infinity;
      }
    }
  }

  async function render() {
    listEl.innerHTML = '<p class="pan-status">✦ 加载中...</p>';
    toolbarEl.innerHTML = '';

    try {
      var files = await fetchFiles(false);
    } catch(e) {
      // 尝试用缓存兜底
      var cached = getCached();
      if (cached) {
        files = cached;
        listEl.innerHTML = '<p class="pan-status">⚠ 加载远程失败，使用缓存数据</p>';
      } else {
        listEl.innerHTML = '<div class="pan-error">✕ 加载失败 (' + e.message + ')</div>';
        return;
      }
    }

    if (!files || files.length === 0) {
      listEl.innerHTML = '<div class="pan-empty">✦ 暂无文件</div>';
      return;
    }

    // 按文件名排序
    files.sort(function(a,b) { return a.name.localeCompare(b.name); });

    // 工具栏
    toolbarEl.innerHTML = '<button class="pan-refresh" id="panRefreshBtn">⟳ 刷新</button>'
      + '<span class="pan-status">✦ ' + files.length + ' 个文件 · ' + fmtDate() + '</span>';

    document.getElementById('panRefreshBtn').addEventListener('click', function() {
      localStorage.removeItem(CACHE_KEY);
      render();
    });

    // 表格
    var html = '<table class="pan-table"><tr><th>文件名</th><th>大小</th><th>操作</th></tr>';
    files.forEach(function(f) {
      var ext = f.name.split('.').pop().toLowerCase();
      var icon = '◇';
      if (['png','jpg','gif','webp','svg'].indexOf(ext) >= 0) icon = '🖼';
      else if (['mp3','ogg','wav','flac'].indexOf(ext) >= 0) icon = '♪';
      else if (['zip','rar','7z','tar','gz'].indexOf(ext) >= 0) icon = '📦';
      else if (['pdf','doc','docx','xls','xlsx','ppt','pptx'].indexOf(ext) >= 0) icon = '📄';
      else if (['py','js','ts','css','html','json','yml','yaml','md'].indexOf(ext) >= 0) icon = '⌨';

      html += '<tr>'
        + '<td class="file-name">' + icon + ' ' + f.name + '</td>'
        + '<td class="file-size">' + fmtSize(f.size) + '</td>'
        + '<td class="pan-actions">'
        + '<button class="pan-btn dl" data-url="' + MIRRORS[0].url(f.name) + '">⬇ 下载</button>'
        + '<button class="pan-btn mirror" data-file="' + f.name + '">🌐 镜像</button>'
        + '<div class="mirror-panel" id="mp-' + encodeURIComponent(f.name) + '">'
        + '<div class="mirror-panel-title">— 镜像节点 —</div>'
        + '<div class="mirror-list-inner"></div></div>'
        + '</td></tr>';
    });
    html += '</table>';
    listEl.innerHTML = html;

    // 绑定下载
    document.querySelectorAll('.pan-btn.dl').forEach(function(btn) {
      btn.addEventListener('click', function() {
        window.open(this.dataset.url, '_blank');
      });
    });

    // 绑定镜像
    document.querySelectorAll('.pan-btn.mirror').forEach(function(btn) {
      var loaded = false;
      btn.addEventListener('click', async function() {
        var fname = this.dataset.file;
        var panel = document.getElementById('mp-' + encodeURIComponent(fname));
        if (!panel) return;

        if (!loaded) {
          loaded = true;
          this.classList.add('active');
          var inner = panel.querySelector('.mirror-list-inner');
          inner.innerHTML = '<span class="mirror-loading">⟳ 测速中...</span>';
          panel.classList.add('open');

          var results = [];
          for (var i = 0; i < MIRRORS.length; i++) {
            var url = MIRRORS[i].url(fname);
            var ms = await measure(url);
            results.push({ name: MIRRORS[i].name, url: url, ms: ms });
          }
          results.sort(function(a,b) { return a.ms - b.ms; });

          var h = '';
          results.forEach(function(r) {
            var cls = r.ms < 500 ? 'fast' : (r.ms >= 2000 ? 'slow' : '');
            var txt = r.ms >= 9999 ? '超时' : r.ms.toFixed(0) + 'ms';
            h += '<span class="mirror-item"><a href="' + r.url + '" target="_blank">' + r.name + '</a>'
              + '<span class="latency ' + cls + '">' + txt + '</span></span>';
          });
          inner.innerHTML = h;
        } else {
          // 切换显示
          panel.classList.toggle('open');
        }
      });
    });
  }

  render();
})();
</script>
