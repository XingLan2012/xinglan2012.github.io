<style>
  /* 全局背景由 bg-slideshow 接管 */

  /* ========== 星空背景容器 ========== */
  .starfield {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }
  .starfield::before {
    content: '';
    position: absolute;
    width: 2px; height: 2px;
    border-radius: 50%;
    background: transparent;
    animation: twinkle 3s ease-in-out infinite alternate;
  }
  .starfield::after {
    content: '';
    position: absolute;
    width: 1px; height: 1px;
    border-radius: 50%;
    background: transparent;
    animation: twinkle2 5s ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    0% { opacity: 0.3; }
    100% { opacity: 1; }
  }
  @keyframes twinkle2 {
    0% { opacity: 0.2; }
    100% { opacity: 0.8; }
  }

  /* ========== 流星 ========== */
  .meteor {
    position: fixed;
    width: 2px; height: 2px;
    background: #fff;
    border-radius: 50%;
    pointer-events: none;
    z-index: 2;
    opacity: 0;
  }
  .meteor::before {
    content: '';
    position: absolute;
    top: 50%; transform: translateY(-50%);
    width: 120px; height: 1.5px;
    background: linear-gradient(to left, rgba(255,255,255,0.8), rgba(255,215,0,0.3), transparent);
    right: 2px;
  }
  @keyframes meteorFall {
    0% { opacity: 0; transform: translate(0, 0); }
    2% { opacity: 1; }
    12% { opacity: 1; }
    15% { opacity: 0; transform: translate(-300px, 200px); }
    100% { opacity: 0; transform: translate(-300px, 200px); }
  }

  /* ========== AI 聊天按钮（浮动在右下角） ========== */
  .ai-btn {
    position: fixed;
    bottom: 28px;
    right: 28px;
    z-index: 1000;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: 1.5px solid rgba(255, 215, 0, 0.35);
    background: rgba(10, 14, 39, 0.75);
    color: #ffd700;
    font-size: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    transition: all 0.3s ease;
    box-shadow: 0 2px 16px rgba(0,0,0,0.4);
    line-height: 1;
    user-select: none;
  }
  .ai-btn:hover {
    border-color: #ffd700;
    box-shadow: 0 0 28px rgba(255, 215, 0, 0.2);
    transform: scale(1.12);
    background: rgba(10, 14, 39, 0.9);
  }

  /* ========== AI 聊天面板 ========== */
  .ai-panel {
    position: fixed;
    bottom: 92px;
    right: 24px;
    z-index: 999;
    width: 360px;
    max-height: 520px;
    background: rgba(10, 14, 39, 0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 215, 0, 0.15);
    border-radius: 16px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    display: none;
    flex-direction: column;
    overflow: hidden;
    transition: all 0.3s ease;
  }
  .ai-panel.open {
    display: flex;
  }
  .ai-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid rgba(255, 215, 0, 0.1);
    color: #ffd700;
    font-size: 14px;
    letter-spacing: 2px;
  }
  .ai-panel-close {
    cursor: pointer;
    font-size: 18px;
    color: rgba(255, 215, 0, 0.5);
    transition: color 0.2s;
    background: none;
    border: none;
    padding: 0;
    line-height: 1;
  }
  .ai-panel-close:hover { color: #ffd700; }
  .ai-messages {
    flex: 1;
    overflow-y: auto;
    padding: 14px 16px;
    min-height: 200px;
    max-height: 360px;
    scroll-behavior: smooth;
  }
  .ai-messages::-webkit-scrollbar { width: 4px; }
  .ai-messages::-webkit-scrollbar-track { background: transparent; }
  .ai-messages::-webkit-scrollbar-thumb { background: rgba(255,215,0,0.3); border-radius: 2px; }

  .ai-msg {
    margin-bottom: 12px;
    font-size: 13px;
    line-height: 1.7;
    color: rgba(255, 255, 255, 0.85);
    word-wrap: break-word;
  }
  .ai-msg.user {
    text-align: right;
    color: #ffd700;
  }
  .ai-msg.ai {
    color: rgba(255, 255, 255, 0.85);
  }
  .ai-msg .label {
    font-size: 11px;
    opacity: 0.5;
    margin-bottom: 4px;
    display: block;
  }
  .ai-msg .typing-dots span {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #ffd700;
    margin: 0 2px;
    animation: dotPulse 1.4s infinite;
  }
  .ai-msg .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .ai-msg .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotPulse {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  .ai-input-area {
    display: flex;
    padding: 10px 14px;
    border-top: 1px solid rgba(255, 215, 0, 0.08);
    gap: 8px;
  }
  .ai-input {
    flex: 1;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 215, 0, 0.12);
    border-radius: 20px;
    padding: 8px 14px;
    color: rgba(255, 255, 255, 0.85);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
  }
  .ai-input:focus { border-color: rgba(255, 215, 0, 0.3); }
  .ai-input::placeholder { color: rgba(255, 255, 255, 0.3); }
  .ai-send {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid rgba(255, 215, 0, 0.2);
    background: rgba(255, 215, 0, 0.1);
    color: #ffd700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    font-size: 16px;
    flex-shrink: 0;
  }
  .ai-send:hover {
    background: rgba(255, 215, 0, 0.2);
    border-color: #ffd700;
  }
  .ai-send:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* ========== 粒子特效（保留） ========== */
  .star-click {
    position: fixed; pointer-events: none; z-index: 9999;
    font-size: 30px; color: #ffd700;
    text-shadow: 0 0 20px rgba(255, 215, 0, 0.9), 0 0 60px rgba(255, 215, 0, 0.4);
    animation: starFly 1.6s ease-out forwards;
  }
  @keyframes starFly {
    0% { opacity: 1; transform: translate(0,0) scale(0.5) rotate(0deg); }
    40% { opacity: 1; transform: translate(var(--tx),var(--ty)) scale(1.4) rotate(180deg); }
    100% { opacity: 0; transform: translate(calc(var(--tx)*1.5),calc(var(--ty)*1.5)) scale(0.6) rotate(360deg); }
  }
  .halo-fixed {
    position: fixed; pointer-events: none; z-index: 9998;
    border-radius: 50%;
    border: 2px solid rgba(255, 215, 0, 0.6);
    box-shadow: 0 0 40px rgba(255, 215, 0, 0.2), inset 0 0 40px rgba(255, 215, 0, 0.1);
    animation: haloPulse 1.8s ease-out forwards;
  }
  @keyframes haloPulse {
    0% { opacity: 0.8; transform: translate(-50%,-50%) scale(0.8); border-color: rgba(255,215,0,0.8); }
    50% { opacity: 1; transform: translate(-50%,-50%) scale(1.2); border-color: rgba(255,215,0,0.9); }
    100% { opacity: 0; transform: translate(-50%,-50%) scale(1); border-color: transparent; }
  }
  .sparkle-dot {
    position: fixed; pointer-events: none; z-index: 9997;
    border-radius: 50%; background: #fff4c2;
    box-shadow: 0 0 8px #ffd700;
    animation: dotFade 1.2s ease-out forwards;
  }
  @keyframes dotFade {
    0% { opacity: 1; transform: translate(0,0) scale(1); }
    100% { opacity: 0; transform: translate(var(--dx),var(--dy)) scale(0); }
  }
  .trail-dot {
    position: fixed; pointer-events: none; z-index: 9999;
    border-radius: 50%; background: #ffd700;
    box-shadow: 0 0 12px rgba(255, 215, 0, 0.6);
    animation: trailFade 1.2s ease-out forwards;
  }
  @keyframes trailFade {
    0% { opacity: 0.8; transform: translate(-50%,-50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%,-50%) scale(0.2); }
  }
  .trail-star {
    position: fixed; pointer-events: none; z-index: 9999;
    font-size: 12px; color: #ffec8b;
    text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
    animation: starTrail 1.5s ease-out forwards;
  }
  @keyframes starTrail {
    0% { opacity: 0.9; transform: translate(-50%,-50%) scale(0.5) rotate(0deg); }
    100% { opacity: 0; transform: translate(-50%,-50%) scale(0.2) rotate(180deg); }
  }
</style>

<!-- ========== 星空背景层 ========== -->
<div class="starfield" id="starfield"></div>

<!-- ========== 流星 ========== -->
<div class="meteor" style="top:5%; left:80%; animation:meteorFall 6s 2s infinite;"></div>
<div class="meteor" style="top:15%; left:60%; animation:meteorFall 8s 5s infinite;"></div>
<div class="meteor" style="top:8%; left:90%; animation:meteorFall 7s 10s infinite;"></div>

<!-- ========== AI 聊天按钮 ========== -->
<div class="ai-btn" id="aiBtn" title="AI 小助手">✦</div>

<!-- ========== AI 聊天面板 ========== -->
<div class="ai-panel" id="aiPanel">
  <div class="ai-panel-header">
    <span>✦ AI 小助手</span>
    <button class="ai-panel-close" id="aiCloseBtn">✕</button>
  </div>
  <div class="ai-messages" id="aiMessages">
    <div class="ai-msg ai">
      <span class="label">✦ 星澜</span>
      你好呀，我是星澜的小助手 ✨<br>有什么想问的，写下来就好。
    </div>
  </div>
  <div class="ai-input-area">
    <input class="ai-input" id="aiInput" type="text" placeholder="输入你的问题..." autocomplete="off">
    <button class="ai-send" id="aiSendBtn">➤</button>
  </div>
</div>

<script>
  // ========== 生成星空 ==========
  (function() {
    const style = document.createElement('style');
    let s1 = '', s2 = '';
    for (let i = 0; i < 300; i++) {
      if (i) s1 += ',';
      s1 += `${Math.random()*100}vw ${Math.random()*100}vh ${Math.random()*2.5+1.5}px rgba(255,255,255,${Math.random()*0.5+0.5})`;
    }
    for (let i = 0; i < 150; i++) {
      if (i) s2 += ',';
      s2 += `${Math.random()*100}vw ${Math.random()*100}vh ${Math.random()*1+0.5}px rgba(200,220,255,${Math.random()*0.3+0.15})`;
    }
    style.textContent = `.starfield::before{box-shadow:${s1}}.starfield::after{box-shadow:${s2}}`;
    document.head.appendChild(style);
  })();

  // ========== AI 聊天控制 ==========
  (function() {
    const btn = document.getElementById('aiBtn');
    const panel = document.getElementById('aiPanel');
    const closeBtn = document.getElementById('aiCloseBtn');
    const messages = document.getElementById('aiMessages');
    const input = document.getElementById('aiInput');
    const sendBtn = document.getElementById('aiSendBtn');

    const API_URL = 'https://apihub.agnes-ai.com/v1/chat/completions';
    const API_KEY = 'sk-f9ErHsuhF4dzN5zHYLnUCn8kEI7T0xPVwzB8HDzLD97RJp1i';

    let isWaiting = false;
    let conversation = [
      { role: 'system', content: '你是一个友善的 AI 小助手，运行在星澜之境博客上。你的名字叫星澜小助手。请用中文回答，语气温暖自然，偶尔可以使用表情符号。' }
    ];

    function openPanel() {
      panel.classList.add('open');
      btn.style.display = 'none';
      setTimeout(function() { input.focus(); }, 200);
      scrollBottom();
    }

    function closePanel() {
      panel.classList.remove('open');
      btn.style.display = 'flex';
    }

    btn.addEventListener('click', openPanel);
    closeBtn.addEventListener('click', closePanel);

    function addMsg(role, text) {
      var div = document.createElement('div');
      div.className = 'ai-msg ' + role;
      var label = document.createElement('span');
      label.className = 'label';
      label.textContent = role === 'user' ? '你' : '✦ 星澜';
      div.appendChild(label);
      div.appendChild(document.createTextNode(text));
      messages.appendChild(div);
      scrollBottom();
      return div;
    }

    function addTyping() {
      var div = document.createElement('div');
      div.className = 'ai-msg ai';
      var label = document.createElement('span');
      label.className = 'label';
      label.textContent = '✦ 星澜';
      div.appendChild(label);
      var dots = document.createElement('span');
      dots.className = 'typing-dots';
      dots.innerHTML = '<span></span><span></span><span></span>';
      div.appendChild(dots);
      messages.appendChild(div);
      scrollBottom();
      return div;
    }

    function scrollBottom() {
      setTimeout(function() {
        messages.scrollTop = messages.scrollHeight;
      }, 50);
    }

    async function askAI(text) {
      isWaiting = true;
      sendBtn.disabled = true;
      input.disabled = true;

      conversation.push({ role: 'user', content: text });
      var typingEl = addTyping();

      try {
        var resp = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + API_KEY
          },
          body: JSON.stringify({
            model: 'gpt-4o-mini',
            messages: conversation,
            stream: false,
            temperature: 0.7,
            max_tokens: 1024
          })
        });

        if (!resp.ok) {
          throw new Error('API 请求失败: ' + resp.status);
        }

        var data = await resp.json();
        var reply = data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content;

        if (!reply) {
          throw new Error('API 返回格式异常');
        }

        // 替换打字指示器为实际回复
        typingEl.remove();
        addMsg('ai', reply);
        conversation.push({ role: 'assistant', content: reply });

        // 控制对话长度，保留最近 10 条
        if (conversation.length > 14) {
          var systemMsg = conversation.shift(); // 保留 system
          conversation = [systemMsg].concat(conversation.slice(-10));
        }

      } catch (err) {
        typingEl.remove();
        addMsg('ai', '唔，好像出了点问题... ' + err.message + ' 🥲');
      }

      isWaiting = false;
      sendBtn.disabled = false;
      input.disabled = false;
      input.focus();
    }

    function sendMessage() {
      var text = input.value.trim();
      if (!text || isWaiting) return;
      input.value = '';
      addMsg('user', text);
      askAI(text);
    }

    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') sendMessage();
    });
  })();

  // ========== 点击星星特效 ==========
  (function() {
    var stars = ['✦','✧','✶','⁕','⋆'];
    var colors = ['#ffd700','#ffec8b','#ffb347','#ffaa33','#ffffff'];
    var halos = ['rgba(255,215,0,0.6)','rgba(100,200,255,0.5)','rgba(255,150,200,0.5)','rgba(200,200,255,0.4)'];
    var dots = ['#ffd700','#fff4c2','#88ddff','#ffaa88'];

    document.addEventListener('click', function(e) {
      var x = e.clientX, y = e.clientY, i, el, angle, dist, tx, ty, size;

      for (i = 0; i < 2 + Math.floor(Math.random()*2); i++) {
        el = document.createElement('div');
        el.className = 'star-click';
        el.textContent = stars[Math.floor(Math.random()*stars.length)];
        angle = Math.random() * 2 * Math.PI;
        dist = Math.random() * 80 + 40;
        tx = Math.cos(angle) * dist;
        ty = Math.sin(angle) * dist - 20;
        el.style.setProperty('--tx', tx+'px');
        el.style.setProperty('--ty', ty+'px');
        el.style.left = (x-15)+'px';
        el.style.top = (y-15)+'px';
        el.style.color = colors[Math.floor(Math.random()*colors.length)];
        el.style.fontSize = (Math.random()*16+22)+'px';
        el.style.animationDuration = (Math.random()*0.3+1.3)+'s';
        document.body.appendChild(el);
        setTimeout(function(){el.remove()},1800);
      }

      el = document.createElement('div');
      el.className = 'halo-fixed';
      el.style.borderColor = halos[Math.floor(Math.random()*halos.length)];
      size = Math.floor(Math.random()*20+50);
      el.style.width = size+'px'; el.style.height = size+'px';
      el.style.left = x+'px'; el.style.top = y+'px';
      document.body.appendChild(el);
      setTimeout(function(){el.remove()},2000);

      for (i = 0; i < 12; i++) {
        var dot = document.createElement('div');
        dot.className = 'sparkle-dot';
        angle = (i/12)*2*Math.PI + Math.random()*0.2;
        dist = size/2 + 8;
        tx = Math.cos(angle)*dist;
        ty = Math.sin(angle)*dist;
        dot.style.setProperty('--dx', tx+'px');
        dot.style.setProperty('--dy', ty+'px');
        dot.style.left = (x+tx-3)+'px';
        dot.style.top = (y+ty-3)+'px';
        var sz = Math.random()*4+3;
        dot.style.width = sz+'px'; dot.style.height = sz+'px';
        dot.style.background = dots[Math.floor(Math.random()*4)];
        document.body.appendChild(dot);
        setTimeout(function(){dot.remove()},1400);
      }
    });
  })();

  // ========== 鼠标轨迹 ==========
  (function() {
    var interval = 60, last = 0;
    var colors = ['#ffd700','#ffec8b','#fff4c2','#88ddff','#ffaa88'];
    var chars = ['✧','✦','·','⋆'];

    document.addEventListener('mousemove', function(e) {
      var now = Date.now();
      if (now - last < interval) return;
      last = now;
      var x = e.clientX, y = e.clientY, el;
      if (Math.random() > 0.6) {
        el = document.createElement('div');
        el.className = 'trail-star';
        el.textContent = chars[Math.floor(Math.random()*chars.length)];
        el.style.left = x+'px'; el.style.top = y+'px';
        el.style.color = colors[Math.floor(Math.random()*colors.length)];
        el.style.fontSize = (Math.random()*8+8)+'px';
        document.body.appendChild(el);
        setTimeout(function(){el.remove()},1600);
      } else {
        el = document.createElement('div');
        el.className = 'trail-dot';
        var sz = Math.random()*6+4;
        el.style.width = sz+'px'; el.style.height = sz+'px';
        el.style.left = x+'px'; el.style.top = y+'px';
        var c = colors[Math.floor(Math.random()*colors.length)];
        el.style.background = c;
        el.style.boxShadow = '0 0 12px '+c;
        el.style.animationDuration = (Math.random()*0.6+0.8)+'s';
        document.body.appendChild(el);
        setTimeout(function(){el.remove()},1600);
      }
    });
  })();
</script>
