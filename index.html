<style>
  /* 页面已有专属背景，隐藏全局 slideshow */
  #bgSlideshow { display: none !important; }

  /* ========== 纯黑背景 ========== */
  html {
    background: #000000 !important;
  }
  body,
  body.starry-mode,
  body:not(.starry-mode) {
    background: #000000 !important;
    min-height: 100vh;
  }
  /* 星澜模式下内容区透明，让 body 黑色透出来 */
  body.starry-mode .page__content,
  body.starry-mode .main,
  body.starry-mode .home-layout-content {
    background: transparent !important;
  }
  /* 非星澜模式：不干涉内容区，让 TeXt 主题控制内部背景 */

  /* ========== 星空背景容器 ========== */
  .starfield {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
    transition: opacity 1.2s ease;
  }
  .starfield.dimmed {
    opacity: 0;
    pointer-events: none;
  }

  .starfield::before {
    content: '';
    position: absolute;
    width: 2px;
    height: 2px;
    border-radius: 50%;
    background: transparent;
    animation: twinkle 3s ease-in-out infinite alternate;
  }
  .starfield::after {
    content: '';
    position: absolute;
    width: 1px;
    height: 1px;
    border-radius: 50%;
    background: transparent;
    animation: twinkle2 5s ease-in-out infinite alternate;
  }

  @keyframes twinkle {
    0% { opacity: 0.3; }
    100% { opacity: 1; }
  }
  @keyframes twinkle2 {
    0% { opacity: 0.2; }
    100% { opacity: 0.8; }
  }

  /* ========== 流星 ========== */
  .meteor {
    position: fixed;
    width: 2px;
    height: 2px;
    background: #fff;
    border-radius: 50%;
    pointer-events: none;
    z-index: 2;
    opacity: 0;
    transition: opacity 1s ease;
  }
  .meteor.dimmed {
    opacity: 0 !important;
    animation-play-state: paused !important;
  }
  .meteor::before {
    content: '';
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 120px;
    height: 1.5px;
    background: linear-gradient(to left, rgba(255,255,255,0.8), rgba(255,215,0,0.3), transparent);
    right: 2px;
  }

  @keyframes meteorFall {
    0% {
      opacity: 0;
      transform: translate(0, 0);
    }
    2% {
      opacity: 1;
    }
    12% {
      opacity: 1;
    }
    15% {
      opacity: 0;
      transform: translate(-300px, 200px);
    }
    100% {
      opacity: 0;
      transform: translate(-300px, 200px);
    }
  }

  /* ========== Hero 欢迎区 ========== */
  .hero-section {
    position: relative;
    z-index: 3;
    text-align: center;
    padding: 80px 20px 60px;
    margin-bottom: 10px;
    transition: all 0.8s ease;
    max-height: 800px;
    overflow: hidden;
  }
  .hero-section.hidden {
    opacity: 0;
    max-height: 0;
    padding-top: 0;
    padding-bottom: 0;
    margin-bottom: 0;
    pointer-events: none;
  }

  .hero-section .hero-icon {
    font-size: 48px;
    display: block;
    margin-bottom: 16px;
    animation: floatGlow 3s ease-in-out infinite;
  }
  .hero-section.hidden .hero-icon {
    animation: none;
  }

  @keyframes floatGlow {
    0%, 100% { transform: translateY(0) scale(1); filter: drop-shadow(0 0 10px rgba(255,215,0,0.3)); }
    50% { transform: translateY(-8px) scale(1.05); filter: drop-shadow(0 0 25px rgba(255,215,0,0.6)); }
  }

  .hero-section h1 {
    font-size: 2.6em;
    color: #ffd700;
    text-shadow: 0 0 30px rgba(255, 215, 0, 0.3), 0 0 80px rgba(255, 215, 0, 0.1);
    margin: 0 0 10px;
    letter-spacing: 6px;
    font-weight: 300;
  }

  .hero-divider {
    width: 80px;
    height: 1.5px;
    background: linear-gradient(90deg, transparent, #ffd700, transparent);
    margin: 16px auto;
    opacity: 0.6;
  }

  .hero-section .hero-sub {
    font-size: 1.15em;
    color: rgba(255, 255, 255, 0.6);
    letter-spacing: 4px;
    margin: 8px 0 20px;
    font-weight: 300;
  }

  .hero-section .hero-poetry {
    color: rgba(255, 215, 0, 0.5);
    font-style: italic;
    font-size: 0.9em;
    line-height: 2;
    letter-spacing: 2px;
    max-width: 500px;
    margin: 0 auto;
  }

  .hero-section .hero-poetry span {
    display: block;
  }

  /* ========== 「开始旅程」按钮 ========== */
  .hero-btn {
    display: inline-block;
    margin-top: 32px;
    padding: 13px 40px;
    border: 1.5px solid rgba(255, 215, 0, 0.4);
    border-radius: 30px;
    color: #ffd700;
    font-size: 0.95em;
    letter-spacing: 4px;
    cursor: pointer;
    background: rgba(255, 215, 0, 0.05);
    transition: all 0.4s ease;
    user-select: none;
    backdrop-filter: blur(4px);
    font-family: inherit;
  }
  .hero-btn:hover {
    background: rgba(255, 215, 0, 0.12);
    border-color: #ffd700;
    box-shadow: 0 0 30px rgba(255, 215, 0, 0.15), inset 0 0 20px rgba(255, 215, 0, 0.05);
    transform: translateY(-3px);
  }
  .hero-btn:active {
    transform: translateY(0);
  }

  /* ========== 浮动「重返星澜」按钮 ========== */
  .hero-toggle-btn {
    position: fixed;
    bottom: 28px;
    right: 28px;
    z-index: 1000;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1.5px solid rgba(255, 215, 0, 0.25);
    background: rgba(10, 14, 39, 0.65);
    color: #ffd700;
    font-size: 20px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    transition: all 0.3s ease;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    line-height: 1;
  }
  .hero-toggle-btn.visible {
    display: flex;
  }
  .hero-toggle-btn:hover {
    border-color: #ffd700;
    box-shadow: 0 0 24px rgba(255, 215, 0, 0.2);
    transform: scale(1.12);
    background: rgba(10, 14, 39, 0.85);
  }

  /* ========== 粒子特效 ========== */
  .star-click {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    font-size: 30px;
    color: #ffd700;
    text-shadow: 0 0 20px rgba(255, 215, 0, 0.9), 0 0 60px rgba(255, 215, 0, 0.4);
    animation: starFly 1.6s ease-out forwards;
  }
  @keyframes starFly {
    0% {
      opacity: 1;
      transform: translate(0, 0) scale(0.5) rotate(0deg);
    }
    40% {
      opacity: 1;
      transform: translate(var(--tx), var(--ty)) scale(1.4) rotate(180deg);
    }
    100% {
      opacity: 0;
      transform: translate(calc(var(--tx) * 1.5), calc(var(--ty) * 1.5)) scale(0.6) rotate(360deg);
    }
  }

  .halo-fixed {
    position: fixed;
    pointer-events: none;
    z-index: 9998;
    border-radius: 50%;
    border: 2px solid rgba(255, 215, 0, 0.6);
    box-shadow: 0 0 40px rgba(255, 215, 0, 0.2), inset 0 0 40px rgba(255, 215, 0, 0.1);
    animation: haloPulse 1.8s ease-out forwards;
  }
  @keyframes haloPulse {
    0% {
      opacity: 0.8;
      transform: translate(-50%, -50%) scale(0.8) rotate(0deg);
      border-color: rgba(255, 215, 0, 0.8);
    }
    50% {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1.2) rotate(180deg);
      border-color: rgba(255, 215, 0, 0.9);
    }
    100% {
      opacity: 0;
      transform: translate(-50%, -50%) scale(1.0) rotate(360deg);
      border-color: rgba(255, 215, 0, 0);
    }
  }

  .sparkle-dot {
    position: fixed;
    pointer-events: none;
    z-index: 9997;
    border-radius: 50%;
    background: #fff4c2;
    box-shadow: 0 0 8px #ffd700;
    animation: dotFade 1.2s ease-out forwards;
  }
  @keyframes dotFade {
    0% {
      opacity: 1;
      transform: translate(0, 0) scale(1);
    }
    100% {
      opacity: 0;
      transform: translate(var(--dx), var(--dy)) scale(0);
    }
  }

  .trail-dot {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    border-radius: 50%;
    background: #ffd700;
    box-shadow: 0 0 12px rgba(255, 215, 0, 0.6);
    animation: trailFade 1.2s ease-out forwards;
  }
  @keyframes trailFade {
    0% {
      opacity: 0.8;
      transform: translate(-50%, -50%) scale(1);
    }
    100% {
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.2);
    }
  }

  .trail-star {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    font-size: 12px;
    color: #ffec8b;
    text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
    animation: starTrail 1.5s ease-out forwards;
  }
  @keyframes starTrail {
    0% {
      opacity: 0.9;
      transform: translate(-50%, -50%) scale(0.5) rotate(0deg);
    }
    100% {
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.2) rotate(180deg);
    }
  }
</style>

<!-- ========== 星空背景层 ========== -->
<div class="starfield" id="starfield"></div>

<!-- ========== 流星 ========== -->
<div class="meteor" id="meteor1" style="top: 5%; left: 80%; animation: meteorFall 6s 2s infinite;"></div>
<div class="meteor" id="meteor2" style="top: 15%; left: 60%; animation: meteorFall 8s 5s infinite;"></div>
<div class="meteor" id="meteor3" style="top: 8%; left: 90%; animation: meteorFall 7s 10s infinite;"></div>

<!-- ========== Hero 欢迎区 ========== -->
<div class="hero-section" id="heroSection">
  <span class="hero-icon">✦</span>
  <h1>星澜之境</h1>
  <div class="hero-divider"></div>
  <p class="hero-sub">致彼岸的乌托邦</p>
  <div class="hero-poetry">
    <span>遇见你，刹那惊鸿，如夏花点燃生命的火</span>
    <span>别离后，静美归途，似秋叶铺满来时的路</span>
  </div>
  <!-- 「开始旅程」按钮 -->
  <div class="hero-btn" id="startJourneyBtn">✦ 开始旅程</div>
</div>

<!-- ========== 浮动「重返星澜」按钮 ========== -->
<div class="hero-toggle-btn" id="heroToggleBtn" title="重返星澜">✦</div>

<script>
  // ========== 生成星空（box-shadow 性能优化） ==========
  (function() {
    const style = document.createElement('style');
    const starCount = 300;
    const starCount2 = 150;

    let shadows1 = '';
    for (let i = 0; i < starCount; i++) {
      if (i > 0) shadows1 += ',';
      const x = Math.random() * 100;
      const y = Math.random() * 100;
      const size = Math.random() * 2.5 + 1.5;
      const opacity = Math.random() * 0.5 + 0.5;
      shadows1 += `${x}vw ${y}vh ${size}px rgba(255,255,255,${opacity})`;
    }

    let shadows2 = '';
    for (let i = 0; i < starCount2; i++) {
      if (i > 0) shadows2 += ',';
      const x = Math.random() * 100;
      const y = Math.random() * 100;
      const size = Math.random() * 1 + 0.5;
      const opacity = Math.random() * 0.3 + 0.15;
      shadows2 += `${x}vw ${y}vh ${size}px rgba(200,220,255,${opacity})`;
    }

    style.textContent = `
      .starfield::before { box-shadow: ${shadows1}; }
      .starfield::after { box-shadow: ${shadows2}; }
    `;
    document.head.appendChild(style);
  })();

  // ========== Hero 收起 / 展开控制 ==========
  (function() {
    const hero = document.getElementById('heroSection');
    const starfield = document.getElementById('starfield');
    const meteors = document.querySelectorAll('.meteor');
    const toggleBtn = document.getElementById('heroToggleBtn');

    function hideHero() {
      // hero 收起
      hero.classList.add('hidden');
      // 星空完全消失（纯黑背景保持）
      starfield.classList.add('dimmed');
      meteors.forEach(function(m) { m.classList.add('dimmed'); });
      // 移除 body 的星澜模式
      document.body.classList.remove('starry-mode');
      // 显示浮动按钮
      toggleBtn.classList.add('visible');
      // 记住状态
      localStorage.setItem('heroHidden', 'true');
      // 平滑滚动到正文
      setTimeout(function() {
        window.scrollTo({ top: window.innerHeight * 0.55, behavior: 'smooth' });
      }, 500);
    }

    function showHero() {
      // hero 展开
      hero.classList.remove('hidden');
      // 星空恢复（纯黑背景保持）
      starfield.classList.remove('dimmed');
      meteors.forEach(function(m) { m.classList.remove('dimmed'); });
      // 启用 body 星澜模式
      document.body.classList.add('starry-mode');
      // 隐藏浮动按钮
      toggleBtn.classList.remove('visible');
      // 滚回顶部
      window.scrollTo({ top: 0, behavior: 'smooth' });
      // 记住状态
      localStorage.setItem('heroHidden', 'false');
    }

    // 页面加载时初始化：默认启用星澜模式
    document.body.classList.add('starry-mode');

    // 「开始旅程」点击
    document.getElementById('startJourneyBtn').addEventListener('click', hideHero);

    // 「重返星澜」点击
    toggleBtn.addEventListener('click', showHero);

    // 如果之前已收起，自动恢复状态
    if (localStorage.getItem('heroHidden') === 'true') {
      hideHero();
      // 直接跳转，无动画
      window.scrollTo({ top: window.innerHeight * 0.55 });
    }
  })();

  // ========== 点击星星特效 ==========
  (function() {
    const starSymbols = ['✦', '✧', '✶', '⁕', '⋆'];
    const colors = ['#ffd700', '#ffec8b', '#ffb347', '#ffaa33', '#ffffff'];
    const haloColors = [
      'rgba(255, 215, 0, 0.6)',
      'rgba(100, 200, 255, 0.5)',
      'rgba(255, 150, 200, 0.5)',
      'rgba(200, 200, 255, 0.4)'
    ];
    const dotBgColors = ['#ffd700', '#fff4c2', '#88ddff', '#ffaa88'];

    document.addEventListener('click', function(e) {
      const x = e.clientX;
      const y = e.clientY;

      const starCount = Math.floor(Math.random() * 2) + 2;
      for (let i = 0; i < starCount; i++) {
        const star = document.createElement('div');
        star.className = 'star-click';
        star.textContent = starSymbols[Math.floor(Math.random() * starSymbols.length)];
        const angle = Math.random() * 2 * Math.PI;
        const distance = Math.random() * 80 + 40;
        const tx = Math.cos(angle) * distance;
        const ty = Math.sin(angle) * distance - 20;
        star.style.setProperty('--tx', tx + 'px');
        star.style.setProperty('--ty', ty + 'px');
        star.style.left = (x - 15) + 'px';
        star.style.top = (y - 15) + 'px';
        star.style.color = colors[Math.floor(Math.random() * colors.length)];
        star.style.fontSize = (Math.random() * 16 + 22) + 'px';
        star.style.animationDuration = (Math.random() * 0.3 + 1.3) + 's';
        document.body.appendChild(star);
        setTimeout(function() { star.remove(); }, 1800);
      }

      const halo = document.createElement('div');
      halo.className = 'halo-fixed';
      halo.style.borderColor = haloColors[Math.floor(Math.random() * haloColors.length)];
      const size = Math.floor(Math.random() * 20 + 50);
      halo.style.width = size + 'px';
      halo.style.height = size + 'px';
      halo.style.left = x + 'px';
      halo.style.top = y + 'px';
      document.body.appendChild(halo);
      setTimeout(function() { halo.remove(); }, 2000);

      const dotCount = 12;
      for (let i = 0; i < dotCount; i++) {
        const dot = document.createElement('div');
        dot.className = 'sparkle-dot';
        const angle = (i / dotCount) * 2 * Math.PI + Math.random() * 0.2;
        const radius = size / 2 + 8;
        const dx = Math.cos(angle) * radius;
        const dy = Math.sin(angle) * radius;
        dot.style.setProperty('--dx', dx + 'px');
        dot.style.setProperty('--dy', dy + 'px');
        dot.style.left = (x + dx - 3) + 'px';
        dot.style.top = (y + dy - 3) + 'px';
        dot.style.width = (Math.random() * 4 + 3) + 'px';
        dot.style.height = dot.style.width;
        dot.style.background = dotBgColors[Math.floor(Math.random() * 4)];
        document.body.appendChild(dot);
        setTimeout(function() { dot.remove(); }, 1400);
      }
    });
  })();

  // ========== 鼠标轨迹 ==========
  (function() {
    const interval = 60;
    let lastTime = 0;
    const colors = ['#ffd700', '#ffec8b', '#fff4c2', '#88ddff', '#ffaa88'];
    const starChars = ['✧', '✦', '·', '⋆'];

    document.addEventListener('mousemove', function(e) {
      const now = Date.now();
      if (now - lastTime < interval) return;
      lastTime = now;

      const x = e.clientX;
      const y = e.clientY;

      if (Math.random() > 0.6) {
        const star = document.createElement('div');
        star.className = 'trail-star';
        star.textContent = starChars[Math.floor(Math.random() * starChars.length)];
        star.style.left = x + 'px';
        star.style.top = y + 'px';
        star.style.color = colors[Math.floor(Math.random() * colors.length)];
        star.style.fontSize = (Math.random() * 8 + 8) + 'px';
        document.body.appendChild(star);
        setTimeout(function() { star.remove(); }, 1600);
      } else {
        const dot = document.createElement('div');
        dot.className = 'trail-dot';
        const size = Math.random() * 6 + 4;
        dot.style.width = size + 'px';
        dot.style.height = size + 'px';
        dot.style.left = x + 'px';
        dot.style.top = y + 'px';
        const color = colors[Math.floor(Math.random() * colors.length)];
        dot.style.background = color;
        dot.style.boxShadow = `0 0 12px ${color}`;
        dot.style.animationDuration = (Math.random() * 0.6 + 0.8) + 's';
        document.body.appendChild(dot);
        setTimeout(function() { dot.remove(); }, 1600);
      }
    });
  })();
</script>
