<style>
  /* ========== 全局暗夜星澜背景 ========== */
  body, html {
    background: linear-gradient(135deg, #0a0e27 0%, #151040 35%, #0d1b3e 65%, #0a0e27 100%) !important;
    min-height: 100vh;
  }

  /* 主内容区背景透明，让星空透出来 */
  .page__content, .main, .hero-section, .home-layout-content {
    background: transparent !important;
  }

  /* ========== CSS 星空背景容器 ========== */
  .starfield {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  /* 星星由 JS 动态生成 box-shadow */
  .starfield::before {
    content: '';
    position: absolute;
    width: 2px;
    height: 2px;
    border-radius: 50%;
    background: transparent;
    animation: twinkle 3s ease-in-out infinite alternate;
  }

  .starfield::after {
    content: '';
    position: absolute;
    width: 1px;
    height: 1px;
    border-radius: 50%;
    background: transparent;
    animation: twinkle2 5s ease-in-out infinite alternate;
  }

  @keyframes twinkle {
    0% { opacity: 0.3; }
    100% { opacity: 1; }
  }
  @keyframes twinkle2 {
    0% { opacity: 0.2; }
    100% { opacity: 0.8; }
  }

  /* ========== 流星 ========== */
  .meteor {
    position: fixed;
    width: 2px;
    height: 2px;
    background: #fff;
    border-radius: 50%;
    pointer-events: none;
    z-index: 1;
    opacity: 0;
  }
  .meteor::before {
    content: '';
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 120px;
    height: 1.5px;
    background: linear-gradient(to left, rgba(255,255,255,0.8), rgba(255,215,0,0.3), transparent);
    right: 2px;
  }

  @keyframes meteorFall {
    0% {
      opacity: 0;
      transform: translate(0, 0);
    }
    2% {
      opacity: 1;
    }
    12% {
      opacity: 1;
    }
    15% {
      opacity: 0;
      transform: translate(-300px, 200px);
    }
    100% {
      opacity: 0;
      transform: translate(-300px, 200px);
    }
  }

  /* ========== Hero 欢迎区 ========== */
  .hero-section {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 80px 20px 50px;
    margin-bottom: 10px;
  }

  .hero-section .hero-icon {
    font-size: 48px;
    display: block;
    margin-bottom: 16px;
    animation: floatGlow 3s ease-in-out infinite;
  }

  @keyframes floatGlow {
    0%, 100% { transform: translateY(0) scale(1); filter: drop-shadow(0 0 10px rgba(255,215,0,0.3)); }
    50% { transform: translateY(-8px) scale(1.05); filter: drop-shadow(0 0 25px rgba(255,215,0,0.6)); }
  }

  .hero-section h1 {
    font-size: 2.6em;
    color: #ffd700;
    text-shadow: 0 0 30px rgba(255, 215, 0, 0.3), 0 0 80px rgba(255, 215, 0, 0.1);
    margin: 0 0 10px;
    letter-spacing: 6px;
    font-weight: 300;
  }

  .hero-divider {
    width: 80px;
    height: 1.5px;
    background: linear-gradient(90deg, transparent, #ffd700, transparent);
    margin: 16px auto;
    opacity: 0.6;
  }

  .hero-section .hero-sub {
    font-size: 1.15em;
    color: rgba(255, 255, 255, 0.6);
    letter-spacing: 4px;
    margin: 8px 0 20px;
    font-weight: 300;
  }

  .hero-section .hero-poetry {
    color: rgba(255, 215, 0, 0.5);
    font-style: italic;
    font-size: 0.9em;
    line-height: 2;
    letter-spacing: 2px;
    max-width: 500px;
    margin: 0 auto;
  }

  .hero-section .hero-poetry span {
    display: block;
  }

  /* ========== 原有点击星星特效（增强适配暗色） ========== */
  .star-click {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    font-size: 30px;
    color: #ffd700;
    text-shadow: 0 0 20px rgba(255, 215, 0, 0.9), 0 0 60px rgba(255, 215, 0, 0.4);
    animation: starFly 1.6s ease-out forwards;
  }
  @keyframes starFly {
    0% {
      opacity: 1;
      transform: translate(0, 0) scale(0.5) rotate(0deg);
    }
    40% {
      opacity: 1;
      transform: translate(var(--tx), var(--ty)) scale(1.4) rotate(180deg);
    }
    100% {
      opacity: 0;
      transform: translate(calc(var(--tx) * 1.5), calc(var(--ty) * 1.5)) scale(0.6) rotate(360deg);
    }
  }

  /* 光环 */
  .halo-fixed {
    position: fixed;
    pointer-events: none;
    z-index: 9998;
    border-radius: 50%;
    border: 2px solid rgba(255, 215, 0, 0.6);
    box-shadow: 0 0 40px rgba(255, 215, 0, 0.2), inset 0 0 40px rgba(255, 215, 0, 0.1);
    animation: haloPulse 1.8s ease-out forwards;
  }
  @keyframes haloPulse {
    0% {
      opacity: 0.8;
      transform: translate(-50%, -50%) scale(0.8) rotate(0deg);
      border-color: rgba(255, 215, 0, 0.8);
    }
    50% {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1.2) rotate(180deg);
      border-color: rgba(255, 215, 0, 0.9);
    }
    100% {
      opacity: 0;
      transform: translate(-50%, -50%) scale(1.0) rotate(360deg);
      border-color: rgba(255, 215, 0, 0);
    }
  }

  /* 小星光粒子 */
  .sparkle-dot {
    position: fixed;
    pointer-events: none;
    z-index: 9997;
    border-radius: 50%;
    background: #fff4c2;
    box-shadow: 0 0 8px #ffd700;
    animation: dotFade 1.2s ease-out forwards;
  }
  @keyframes dotFade {
    0% {
      opacity: 1;
      transform: translate(0, 0) scale(1);
    }
    100% {
      opacity: 0;
      transform: translate(var(--dx), var(--dy)) scale(0);
    }
  }

  /* 鼠标轨迹光点 */
  .trail-dot {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    border-radius: 50%;
    background: #ffd700;
    box-shadow: 0 0 12px rgba(255, 215, 0, 0.6);
    animation: trailFade 1.2s ease-out forwards;
  }
  @keyframes trailFade {
    0% {
      opacity: 0.8;
      transform: translate(-50%, -50%) scale(1);
    }
    100% {
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.2);
    }
  }

  .trail-star {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    font-size: 12px;
    color: #ffec8b;
    text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
    animation: starTrail 1.5s ease-out forwards;
  }
  @keyframes starTrail {
    0% {
      opacity: 0.9;
      transform: translate(-50%, -50%) scale(0.5) rotate(0deg);
    }
    100% {
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.2) rotate(180deg);
    }
  }
</style>

<!-- ========== 星空背景层 ========== -->
<div class="starfield" id="starfield"></div>

<!-- ========== 流星 ========== -->
<div class="meteor" id="meteor1" style="top: 5%; left: 80%; animation: meteorFall 6s 2s infinite;"></div>
<div class="meteor" id="meteor2" style="top: 15%; left: 60%; animation: meteorFall 8s 5s infinite;"></div>
<div class="meteor" id="meteor3" style="top: 8%; left: 90%; animation: meteorFall 7s 10s infinite;"></div>

<!-- ========== Hero 欢迎区 ========== -->
<div class="hero-section">
  <span class="hero-icon">✦</span>
  <h1>星澜之境</h1>
  <div class="hero-divider"></div>
  <p class="hero-sub">致彼岸的乌托邦</p>
  <div class="hero-poetry">
    <span>遇见你，刹那惊鸿，如夏花点燃生命的火</span>
    <span>别离后，静美归途，似秋叶铺满来时的路</span>
  </div>
</div>

<script>
  // ========== 生成星空（box-shadow 性能优化） ==========
  (function() {
    const style = document.createElement('style');
    const starCount = 300;
    const starCount2 = 150;

    // 主星星（亮、大）
    let shadows1 = '';
    for (let i = 0; i < starCount; i++) {
      if (i > 0) shadows1 += ',';
      const x = Math.random() * 100;
      const y = Math.random() * 100;
      const size = Math.random() * 2.5 + 1.5;
      const opacity = Math.random() * 0.5 + 0.5;
      shadows1 += `${x}vw ${y}vh ${size}px rgba(255,255,255,${opacity})`;
    }

    // 次星星（暗、小）
    let shadows2 = '';
    for (let i = 0; i < starCount2; i++) {
      if (i > 0) shadows2 += ',';
      const x = Math.random() * 100;
      const y = Math.random() * 100;
      const size = Math.random() * 1 + 0.5;
      const opacity = Math.random() * 0.3 + 0.15;
      shadows2 += `${x}vw ${y}vh ${size}px rgba(200,220,255,${opacity})`;
    }

    style.textContent = `
      .starfield::before { box-shadow: ${shadows1}; }
      .starfield::after { box-shadow: ${shadows2}; }
    `;
    document.head.appendChild(style);
  })();

  // ========== 点击星星特效 ==========
  (function() {
    const starSymbols = ['✦', '✧', '✶', '⁕', '⋆'];
    const colors = ['#ffd700', '#ffec8b', '#ffb347', '#ffaa33', '#ffffff'];
    const haloColors = [
      'rgba(255, 215, 0, 0.6)',
      'rgba(100, 200, 255, 0.5)',
      'rgba(255, 150, 200, 0.5)',
      'rgba(200, 200, 255, 0.4)'
    ];
    const dotBgColors = ['#ffd700', '#fff4c2', '#88ddff', '#ffaa88'];

    document.addEventListener('click', function(e) {
      const x = e.clientX;
      const y = e.clientY;

      // 星星
      const starCount = Math.floor(Math.random() * 2) + 2;
      for (let i = 0; i < starCount; i++) {
        const star = document.createElement('div');
        star.className = 'star-click';
        star.textContent = starSymbols[Math.floor(Math.random() * starSymbols.length)];
        const angle = Math.random() * 2 * Math.PI;
        const distance = Math.random() * 80 + 40;
        const tx = Math.cos(angle) * distance;
        const ty = Math.sin(angle) * distance - 20;
        star.style.setProperty('--tx', tx + 'px');
        star.style.setProperty('--ty', ty + 'px');
        star.style.left = (x - 15) + 'px';
        star.style.top = (y - 15) + 'px';
        star.style.color = colors[Math.floor(Math.random() * colors.length)];
        star.style.fontSize = (Math.random() * 16 + 22) + 'px';
        star.style.animationDuration = (Math.random() * 0.3 + 1.3) + 's';
        document.body.appendChild(star);
        setTimeout(() => star.remove(), 1800);
      }

      // 光环
      const halo = document.createElement('div');
      halo.className = 'halo-fixed';
      halo.style.borderColor = haloColors[Math.floor(Math.random() * haloColors.length)];
      const size = Math.floor(Math.random() * 20 + 50);
      halo.style.width = size + 'px';
      halo.style.height = size + 'px';
      halo.style.left = x + 'px';
      halo.style.top = y + 'px';
      document.body.appendChild(halo);
      setTimeout(() => halo.remove(), 2000);

      // 小星光
      const dotCount = 12;
      for (let i = 0; i < dotCount; i++) {
        const dot = document.createElement('div');
        dot.className = 'sparkle-dot';
        const angle = (i / dotCount) * 2 * Math.PI + Math.random() * 0.2;
        const radius = size / 2 + 8;
        const dx = Math.cos(angle) * radius;
        const dy = Math.sin(angle) * radius;
        dot.style.setProperty('--dx', dx + 'px');
        dot.style.setProperty('--dy', dy + 'px');
        dot.style.left = (x + dx - 3) + 'px';
        dot.style.top = (y + dy - 3) + 'px';
        dot.style.width = (Math.random() * 4 + 3) + 'px';
        dot.style.height = dot.style.width;
        dot.style.background = dotBgColors[Math.floor(Math.random() * 4)];
        document.body.appendChild(dot);
        setTimeout(() => dot.remove(), 1400);
      }
    });
  })();

  // ========== 鼠标轨迹 ==========
  (function() {
    const interval = 60;
    let lastTime = 0;
    const colors = ['#ffd700', '#ffec8b', '#fff4c2', '#88ddff', '#ffaa88'];
    const starChars = ['✧', '✦', '·', '⋆'];

    document.addEventListener('mousemove', function(e) {
      const now = Date.now();
      if (now - lastTime < interval) return;
      lastTime = now;

      const x = e.clientX;
      const y = e.clientY;

      if (Math.random() > 0.6) {
        const star = document.createElement('div');
        star.className = 'trail-star';
        star.textContent = starChars[Math.floor(Math.random() * starChars.length)];
        star.style.left = x + 'px';
        star.style.top = y + 'px';
        star.style.color = colors[Math.floor(Math.random() * colors.length)];
        star.style.fontSize = (Math.random() * 8 + 8) + 'px';
        document.body.appendChild(star);
        setTimeout(() => star.remove(), 1600);
      } else {
        const dot = document.createElement('div');
        dot.className = 'trail-dot';
        const size = Math.random() * 6 + 4;
        dot.style.width = size + 'px';
        dot.style.height = size + 'px';
        dot.style.left = x + 'px';
        dot.style.top = y + 'px';
        const color = colors[Math.floor(Math.random() * colors.length)];
        dot.style.background = color;
        dot.style.boxShadow = `0 0 12px ${color}`;
        dot.style.animationDuration = (Math.random() * 0.6 + 0.8) + 's';
        document.body.appendChild(dot);
        setTimeout(() => dot.remove(), 1600);
      }
    });
  })();
</script>
