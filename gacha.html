<style>
  /* ========== 抽卡系统 ========== */
  .gacha-wrap {
    max-width: 700px;
    margin: 0 auto;
    padding: 20px 0;
    text-align: center;
  }

  /* 标题区 */
  .gacha-title {
    font-size: 22px;
    color: #ffd700;
    letter-spacing: 6px;
    font-weight: 300;
    margin-bottom: 6px;
  }
  .gacha-sub {
    font-size: 12px;
    color: rgba(255, 215, 0, 0.35);
    letter-spacing: 3px;
    margin-bottom: 24px;
  }

  /* 统计面板 */
  .gacha-stats {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .gacha-stat {
    text-align: center;
    min-width: 50px;
  }
  .gacha-stat .val {
    font-size: 20px;
    font-weight: 300;
    letter-spacing: 1px;
  }
  .gacha-stat .lbl {
    font-size: 10px;
    color: rgba(255,255,255,0.35);
    margin-top: 2px;
    letter-spacing: 1px;
  }
  .stat-n .val { color: rgba(255,255,255,0.5); }
  .stat-r .val { color: #5b9bd5; }
  .stat-sr .val { color: #9b59b6; }
  .stat-ssr .val { color: #ffd700; }
  .stat-ur .val { color: #ff4444; text-shadow: 0 0 20px rgba(255,68,68,0.4); }

  /* 抽卡动画区 */
  .gacha-stage {
    position: relative;
    width: 240px;
    height: 340px;
    margin: 0 auto 28px;
    perspective: 1200px;
  }

  /* 卡片容器 */
  .card-container {
    position: relative;
    width: 100%;
    height: 100%;
    transition: transform 0.6s ease;
    transform-style: preserve-3d;
  }
  .card-container.flipping {
    animation: cardFlip 1s ease-out forwards;
  }
  @keyframes cardFlip {
    0% { transform: rotateY(0deg) scale(1); }
    30% { transform: rotateY(180deg) scale(0.9) translateY(-20px); }
    60% { transform: rotateY(360deg) scale(1.05) translateY(0); }
    80% { transform: rotateY(360deg) scale(0.98); }
    100% { transform: rotateY(360deg) scale(1); }
  }

  /* 卡片正面（卡背） */
  .card-face {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border-radius: 16px;
    backface-visibility: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    overflow: hidden;
  }
  .card-back {
    background: linear-gradient(135deg, #0a0e27 0%, #151040 50%, #0d1b3e 100%);
    border: 2px solid rgba(255, 215, 0, 0.15);
    box-shadow: 0 0 30px rgba(255, 215, 0, 0.05), inset 0 0 30px rgba(255, 215, 0, 0.03);
    z-index: 2;
  }
  .card-back-icon {
    font-size: 48px;
    color: rgba(255, 215, 0, 0.2);
    animation: cardBackPulse 2s ease-in-out infinite;
  }
  @keyframes cardBackPulse {
    0%, 100% { opacity: 0.4; transform: scale(1); }
    50% { opacity: 0.7; transform: scale(1.08); }
  }
  .card-back-text {
    margin-top: 16px;
    font-size: 12px;
    color: rgba(255, 215, 0, 0.15);
    letter-spacing: 4px;
  }

  /* 卡片正面（抽到的卡） */
  .card-front {
    border: 2px solid;
    box-shadow: 0 0 40px;
    transform: rotateY(180deg);
    z-index: 1;
  }
  .card-front .card-rarity {
    position: absolute;
    top: 12px; right: 14px;
    font-size: 11px;
    letter-spacing: 2px;
    font-weight: 400;
  }
  .card-front .card-name {
    font-size: 16px;
    letter-spacing: 3px;
    font-weight: 300;
    margin-bottom: 6px;
  }
  .card-front .card-sub {
    font-size: 11px;
    opacity: 0.6;
    letter-spacing: 1px;
  }
  .card-front .card-icon-big {
    font-size: 56px;
    margin-bottom: 12px;
    filter: drop-shadow(0 0 20px currentColor);
  }

  /* 稀有度颜色 */
  .card-rarity-n {
    background: linear-gradient(135deg, #2a2a2a, #3a3a3a);
    border-color: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.5);
    box-shadow: 0 0 20px rgba(255,255,255,0.03);
  }
  .card-rarity-r {
    background: linear-gradient(135deg, #1a2a3a, #1a3a5a);
    border-color: rgba(91,155,213,0.3);
    color: #5b9bd5;
    box-shadow: 0 0 30px rgba(91,155,213,0.1);
  }
  .card-rarity-sr {
    background: linear-gradient(135deg, #2a1a3a, #3a1a5a);
    border-color: rgba(155,89,182,0.3);
    color: #9b59b6;
    box-shadow: 0 0 30px rgba(155,89,182,0.15);
  }
  .card-rarity-ssr {
    background: linear-gradient(135deg, #2a2510, #3a2a10);
    border-color: rgba(255,215,0,0.4);
    color: #ffd700;
    box-shadow: 0 0 40px rgba(255,215,0,0.2);
  }
  .card-rarity-ur {
    background: linear-gradient(135deg, #2a1010, #3a1010);
    border-color: rgba(255,68,68,0.4);
    color: #ff4444;
    box-shadow: 0 0 50px rgba(255,68,68,0.25);
  }

  /* 抽卡结果文字 */
  .gacha-result {
    min-height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
  }
  .gacha-result-text {
    font-size: 14px;
    letter-spacing: 2px;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .gacha-result-text.show {
    opacity: 1;
  }
  .gacha-result-text.n  { color: rgba(255,255,255,0.4); }
  .gacha-result-text.r  { color: #5b9bd5; }
  .gacha-result-text.sr { color: #9b59b6; }
  .gacha-result-text.ssr { color: #ffd700; text-shadow: 0 0 20px rgba(255,215,0,0.3); }
  .gacha-result-text.ur  { color: #ff4444; text-shadow: 0 0 30px rgba(255,68,68,0.3); }

  /* 抽卡按钮 */
  .gacha-btn {
    display: inline-block;
    padding: 12px 48px;
    border: 1.5px solid rgba(255, 215, 0, 0.3);
    border-radius: 30px;
    color: #ffd700;
    font-size: 14px;
    letter-spacing: 4px;
    cursor: pointer;
    background: rgba(255, 215, 0, 0.04);
    transition: all 0.3s ease;
    user-select: none;
    font-family: inherit;
    margin-bottom: 30px;
  }
  .gacha-btn:hover {
    background: rgba(255, 215, 0, 0.1);
    border-color: #ffd700;
    box-shadow: 0 0 24px rgba(255, 215, 0, 0.08);
  }
  .gacha-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    transform: none !important;
  }

  /* 卡池概率 */
  .gacha-rates {
    max-width: 400px;
    margin: 0 auto 20px;
    padding: 14px 18px;
    background: rgba(255,215,0,0.02);
    border: 1px solid rgba(255,215,0,0.06);
    border-radius: 10px;
  }
  .gacha-rates-title {
    font-size: 11px;
    color: rgba(255,215,0,0.3);
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .gacha-rate-row {
    display: flex;
    justify-content: space-between;
    padding: 2px 0;
    font-size: 11px;
  }
  .gacha-rate-row .label { color: rgba(255,255,255,0.35); }
  .gacha-rate-row .value { letter-spacing: 1px; }
  .rate-n .value { color: rgba(255,255,255,0.4); }
  .rate-r .value { color: #5b9bd5; }
  .rate-sr .value { color: #9b59b6; }
  .rate-ssr .value { color: #ffd700; }
  .rate-ur .value { color: #ff4444; }

  /* 已收集展示 */
  .gacha-collection {
    margin-top: 10px;
  }
  .gacha-collection-title {
    font-size: 12px;
    color: rgba(255,215,0,0.3);
    letter-spacing: 2px;
    margin-bottom: 12px;
  }
  .gacha-collection-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }
  .gacha-collection-card {
    width: 52px; height: 52px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    border: 1px solid;
    transition: transform 0.2s;
    cursor: default;
    position: relative;
  }
  .gacha-collection-card:hover {
    transform: scale(1.1);
  }
  .gacha-collection-card .mini-rarity {
    position: absolute;
    bottom: 2px;
    font-size: 7px;
    letter-spacing: 1px;
  }
  .coll-n { border-color: rgba(255,255,255,0.08); background: rgba(255,255,255,0.02); color: rgba(255,255,255,0.3); }
  .coll-r { border-color: rgba(91,155,213,0.2); background: rgba(91,155,213,0.05); color: #5b9bd5; }
  .coll-sr { border-color: rgba(155,89,182,0.2); background: rgba(155,89,182,0.05); color: #9b59b6; }
  .coll-ssr { border-color: rgba(255,215,0,0.25); background: rgba(255,215,0,0.05); color: #ffd700; }
  .coll-ur { border-color: rgba(255,68,68,0.25); background: rgba(255,68,68,0.05); color: #ff4444; }
</style>

</div>

<script>
(function() {
  // ========== 卡池配置 ==========
  var RARITIES = [
    { key: 'n',  label: 'N',  chance: 0.40, icon: '◆', names: ['砾石','尘埃','露珠','微风','萤火','苔痕','涟漪','叶脉','星屑'] },
    { key: 'r',  label: 'R',  chance: 0.30, icon: '◇', names: ['月光','溪流','篝火','浮云','松涛','晚钟','牧歌','纸鸢','潮汐'] },
    { key: 'sr', label: 'SR', chance: 0.20, icon: '✧', names: ['星轨','极光','幻境','琥珀','银霜','流萤','珊瑚','海市','蜃楼'] },
    { key: 'ssr',label: 'SSR',chance: 0.08, icon: '✦', names: ['彼岸','乌托邦','星澜','永恒','归途','惊鸿','夏花','星河','苍穹'] },
    { key: 'ur', label: 'UR', chance: 0.02, icon: '★', names: ['奇迹','起源','终焉','神明','混沌','创世','无限','轮回','涅槃'] },
  ];

  // 为每个稀有度生成所有卡片池
  var CARD_POOL = [];
  RARITIES.forEach(function(r) {
    r.names.forEach(function(n) {
      CARD_POOL.push({ rarity: r.key, label: r.label, name: n, icon: r.icon });
    });
  });

  // ========== 状态 ==========
  var pullCount = 0;
  var collection = JSON.parse(localStorage.getItem('gachaCollection') || '[]');
  var rarityCount = { n:0, r:0, sr:0, ssr:0, ur:0 };
  collection.forEach(function(c) { rarityCount[c.rarity] = (rarityCount[c.rarity] || 0) + 1; });

  var isPulling = false;

  // DOM
  var container = document.getElementById('cardContainer');
  var cardFront = document.getElementById('cardFront');
  var cardIcon = document.getElementById('cardIcon');
  var cardName = document.getElementById('cardName');
  var cardSub = document.getElementById('cardSub');
  var cardRarityBadge = document.getElementById('cardRarityBadge');
  var resultText = document.getElementById('gachaResultText');
  var gachaBtn = document.getElementById('gachaBtn');
  var collGrid = document.getElementById('gachaCollection');

  var SUBS = {
    n:  '平凡之物',
    r:  '稀罕之物',
    sr: '珍奇之物',
    ssr:'传说之物',
    ur: '神话之物'
  };

  // ========== 更新统计 ==========
  function updateStats() {
    document.getElementById('statN').textContent = rarityCount.n || 0;
    document.getElementById('statR').textContent = rarityCount.r || 0;
    document.getElementById('statSR').textContent = rarityCount.sr || 0;
    document.getElementById('statSSR').textContent = rarityCount.ssr || 0;
    document.getElementById('statUR').textContent = rarityCount.ur || 0;
  }

  // ========== 渲染收藏 ==========
  function renderCollection() {
    collGrid.innerHTML = '';
    collection.forEach(function(c, i) {
      var el = document.createElement('div');
      el.className = 'gacha-collection-card coll-' + c.rarity;
      el.innerHTML = c.icon + '<span class="mini-rarity">' + c.label + '</span>';
      el.title = c.name + ' (' + c.label + ')';
      collGrid.appendChild(el);
    });
  }

  // ========== 抽一张 ==========
  function pullCard() {
    if (isPulling) return;
    isPulling = true;
    gachaBtn.disabled = true;

    // 随机决定稀有度
    var rand = Math.random();
    var cum = 0;
    var chosenRarity = RARITIES[RARITIES.length - 1];
    for (var i = 0; i < RARITIES.length; i++) {
      cum += RARITIES[i].chance;
      if (rand < cum) { chosenRarity = RARITIES[i]; break; }
    }

    // 在该稀有度内随机选一张
    var pool = CARD_POOL.filter(function(c) { return c.rarity === chosenRarity.key; });
    var card = pool[Math.floor(Math.random() * pool.length)];

    // 添加到收藏
    collection.push({ rarity: card.rarity, label: card.label, name: card.name, icon: card.icon });
    rarityCount[card.rarity] = (rarityCount[card.rarity] || 0) + 1;
    localStorage.setItem('gachaCollection', JSON.stringify(collection));
    updateStats();

    // 更新卡片正面
    cardFront.className = 'card-face card-front card-rarity-' + card.rarity;
    cardIcon.textContent = card.icon;
    cardName.textContent = card.name;
    cardSub.textContent = SUBS[card.rarity];
    cardRarityBadge.textContent = card.label;

    // 结果文字
    resultText.className = 'gacha-result-text ' + card.rarity;
    resultText.textContent = '✦ 「' + card.name + '」(' + card.label + ')';
    setTimeout(function() { resultText.classList.add('show'); }, 100);

    // 翻转动画
    container.classList.remove('flipping');
    void container.offsetWidth; // 触发回流重新播放动画
    container.classList.add('flipping');

    // 渲染收藏
    renderCollection();

    pullCount++;

    // 解锁
    setTimeout(function() {
      isPulling = false;
      gachaBtn.disabled = false;
    }, 1100);
  }

  // ========== 初始化 ==========
  updateStats();
  renderCollection();
  resultText.textContent = '已抽 ' + collection.length + ' 次，继续探索吧 ✦';

  gachaBtn.addEventListener('click', pullCard);
})();
</script>
