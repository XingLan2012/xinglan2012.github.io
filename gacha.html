<style>
  .fortune-wrap {
    max-width: 600px;
    margin: 0 auto;
    padding: 30px 0 20px;
    text-align: center;
  }
  .fortune-title {
    font-size: 24px;
    color: #ffd700;
    letter-spacing: 8px;
    font-weight: 300;
    margin-bottom: 4px;
  }
  .fortune-sub {
    font-size: 12px;
    color: rgba(255,215,0,0.3);
    letter-spacing: 3px;
    margin-bottom: 30px;
  }

  /* 签文显示区 */
  .fortune-stage {
    position: relative;
    width: 280px;
    min-height: 360px;
    margin: 0 auto 24px;
    padding: 40px 28px 32px;
    background: rgba(10,14,39,0.6);
    border: 1px solid rgba(255,215,0,0.08);
    border-radius: 18px;
    box-shadow: 0 0 40px rgba(0,0,0,0.3), inset 0 0 60px rgba(255,215,0,0.02);
    transition: all 0.5s ease;
    overflow: hidden;
  }

  /* 签文背景图（淡） */
  .fortune-bg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-size: cover;
    background-position: center;
    opacity: 0.08;
    transition: opacity 0.8s ease;
    pointer-events: none;
  }
  .fortune-stage.has-bg .fortune-bg { opacity: 0.15; }

  /* 等级标记 */
  .fortune-level {
    position: relative;
    z-index: 1;
    font-size: 52px;
    letter-spacing: 6px;
    font-weight: 300;
    margin-bottom: 6px;
    opacity: 0;
    transform: scale(0.5);
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .fortune-stage.show .fortune-level {
    opacity: 1;
    transform: scale(1);
  }

  .level-da-ji .fortune-level { color: #ffd700; text-shadow: 0 0 40px rgba(255,215,0,0.3); }
  .level-zhong-ji .fortune-level { color: #5b9bd5; text-shadow: 0 0 30px rgba(91,155,213,0.2); }
  .level-zhong-ping .fortune-level { color: rgba(255,255,255,0.5); }
  .level-xiong .fortune-level { color: #cc8844; text-shadow: 0 0 20px rgba(204,136,68,0.15); }
  .level-da-xiong .fortune-level { color: #884444; text-shadow: 0 0 20px rgba(136,68,68,0.15); }

  .fortune-level-label {
    position: relative;
    z-index: 1;
    font-size: 11px;
    letter-spacing: 4px;
    opacity: 0;
    transition: opacity 0.6s 0.2s ease;
    margin-bottom: 20px;
  }
  .fortune-stage.show .fortune-level-label { opacity: 0.5; }

  /* 签文诗句 */
  .fortune-poem {
    position: relative;
    z-index: 1;
    font-size: 13px;
    line-height: 2;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.75);
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.6s 0.3s ease;
  }
  .fortune-stage.show .fortune-poem {
    opacity: 1;
    transform: translateY(0);
  }
  .fortune-poem .line {
    display: block;
  }

  /* 签文解读 */
  .fortune-reading {
    position: relative;
    z-index: 1;
    margin-top: 16px;
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 1px;
    line-height: 1.8;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.6s 0.4s ease;
  }
  .fortune-stage.show .fortune-reading {
    opacity: 1;
    transform: translateY(0);
  }

  /* 日期 */
  .fortune-date {
    position: relative;
    z-index: 1;
    margin-top: 18px;
    font-size: 10px;
    color: rgba(255,255,255,0.15);
    letter-spacing: 2px;
    opacity: 0;
    transition: opacity 0.5s 0.5s ease;
  }
  .fortune-stage.show .fortune-date { opacity: 1; }

  /* 初始状态（未抽） */
  .fortune-placeholder {
    position: relative;
    z-index: 1;
    font-size: 14px;
    color: rgba(255,215,0,0.2);
    letter-spacing: 4px;
  }
  .fortune-stage.show .fortune-placeholder { display: none; }

  /* 按钮 */
  /* 按钮容器 */
  .fortune-actions {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 30px;
  }
  .fortune-btn {
    padding: 12px 52px;
    border: 1.5px solid rgba(255,215,0,0.25);
    border-radius: 30px;
    color: #ffd700;
    font-size: 14px;
    letter-spacing: 4px;
    cursor: pointer;
    background: rgba(255,215,0,0.03);
    transition: all 0.3s ease;
    user-select: none;
    font-family: inherit;
  }
  .fortune-btn:hover {
    background: rgba(255,215,0,0.08);
    border-color: #ffd700;
    box-shadow: 0 0 24px rgba(255,215,0,0.06);
  }
  .fortune-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }
  .fortune-btn.done {
    opacity: 0.5;
    border-color: rgba(255,215,0,0.1);
    cursor: default;
  }
  .fortune-btn.done:hover {
    background: rgba(255,215,0,0.03);
    box-shadow: none;
  }

  /* 清除按钮 */
  .fortune-clear {
    padding: 10px 20px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    color: rgba(255,255,255,0.25);
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
    background: transparent;
    transition: all 0.3s ease;
    font-family: inherit;
  }
  .fortune-clear:hover {
    color: rgba(255,100,100,0.6);
    border-color: rgba(255,100,100,0.2);
  }

  /* 概率表 */
  .fortune-rates {
    max-width: 360px;
    margin: 0 auto;
    padding: 14px 18px;
    background: rgba(255,215,0,0.02);
    border: 1px solid rgba(255,215,0,0.05);
    border-radius: 10px;
  }
  .fortune-rates-title {
    font-size: 11px;
    color: rgba(255,215,0,0.25);
    letter-spacing: 2px;
    margin-bottom: 6px;
  }
  .fortune-rate-row {
    display: flex;
    justify-content: space-between;
    padding: 2px 0;
    font-size: 11px;
  }
  .fortune-rate-row .lbl { color: rgba(255,255,255,0.3); }
  .fortune-rate-row .val { letter-spacing: 1px; }
  .rate-dj .val { color: #ffd700; }
  .rate-zj .val { color: #5b9bd5; }
  .rate-zp .val { color: rgba(255,255,255,0.4); }
  .rate-x .val { color: #cc8844; }
  .rate-dx .val { color: #884444; }

  /* 抖动静止纯 CSS */
  @keyframes fortuneShake {
    0%, 100% { transform: translate(0); }
    10% { transform: translate(-4px, 2px); }
    20% { transform: translate(4px, -2px); }
    30% { transform: translate(-3px, 3px); }
    40% { transform: translate(3px, -1px); }
    50% { transform: translate(-2px, 1px); }
    60% { transform: translate(2px, -3px); }
    70% { transform: translate(-1px, 2px); }
    80% { transform: translate(3px, -2px); }
    90% { transform: translate(-2px, 1px); }
  }
  .fortune-stage.shaking {
    animation: fortuneShake 0.6s ease-out;
  }
</style>

<script>
(function() {
  // ========== 命运签配置 ==========
  var FORTUNES = [
    {
      key: 'da-ji', label: '大吉', level: '大吉', chance: 0.12,
      bg: '/assets/images/bg/bg1.png',
      poems: [
        ['星河灿烂，天地清朗。', '万事皆宜，诸般顺遂。'],
        ['长风破浪，直挂云帆。', '前路光明，莫问归期。'],
        ['春回大地，万象更新。', '花开有时，好事将近。'],
        ['凤鸣高岗，龙腾九霄。', '此行不虚，必有所成。'],
        ['日升月恒，天赐良缘。', '随心而动，自得圆满。'],
        ['云开见日，水到渠成。', '一切所求，皆如所愿。'],
      ],
      readings: [
        '今日天时地利，宜大胆行动。',
        '好运正在降临，请保持期待。',
        '诸事顺遂，所行皆坦途。',
        '万物向荣，正是好时节。',
      ]
    },
    {
      key: 'zhong-ji', label: '中吉', level: '中吉', chance: 0.28,
      bg: '/assets/images/bg/bg2.png',
      poems: [
        ['山重水复，柳暗花明。', '虽有波折，终见坦途。'],
        ['月有阴晴，事有缓急。', '稍安勿躁，自有其时。'],
        ['逆水行舟，不进则退。', '勉力为之，可保无虞。'],
        ['老树新芽，枯木逢春。', '否极泰来，运道渐昌。'],
        ['行到水穷处，坐看云起时。', '耐心等待，转机将至。'],
        ['事虽小，不为不成。', '路虽近，不行不至。'],
      ],
      readings: [
        '整体运势不错，一些小波折无伤大雅。',
        '耐心一些，好运会慢慢靠近。',
        '适合作出计划，但不宜操之过急。',
        '事情正在朝好的方向发展。',
      ]
    },
    {
      key: 'zhong-ping', label: '中平', level: '中平', chance: 0.35,
      bg: '/assets/images/bg/bg3.png',
      poems: [
        ['风平浪静，波澜不惊。', '平平淡淡，亦是真味。'],
        ['不雨花犹落，无风絮自飞。', '顺其自然，随遇而安。'],
        ['白云苍狗，世事无常。', '守得本心，便是晴天。'],
        ['万事随缘，不可强求。', '得之我幸，失之我命。'],
        ['日日是好日，年年是好年。', '平常心是道。'],
        ['不急不躁，不悲不喜。', '静水流深，暗香浮动。'],
      ],
      readings: [
        '今日运势平稳，适合按部就班。',
        '没有好消息，也没有坏消息，就是最好的消息。',
        '保持平常心，不急不躁。',
        '平淡的一天，适合休养生息。',
      ]
    },
    {
      key: 'xiong', label: '凶', level: '凶', chance: 0.18,
      bg: '/assets/images/bg/bg2.png',
      poems: [
        ['乌云蔽日，前路难明。', '宜静不宜动，宜守不宜攻。'],
        ['屋漏偏逢连夜雨，船迟又遇打头风。', '诸事不顺，且自谨慎。'],
        ['覆巢之下，安有完卵。', '大势如此，莫要强求。'],
        ['前有悬崖，后有追兵。', '进退维谷，当思良策。'],
        ['风波起于青萍之末，', '祸患藏于微末之间。'],
        ['举步维艰，动辄得咎。', '忍一时之气，免百日之忧。'],
      ],
      readings: [
        '今日运势不佳，建议低调行事。',
        '宜静不宜动，等待时机。',
        '小心防备，避免冲动决策。',
        '祸兮福所倚，坏事也可能变好事。',
      ]
    },
    {
      key: 'da-xiong', label: '大凶', level: '大凶', chance: 0.07,
      bg: '/assets/images/bg/bg1.png',
      poems: [
        ['天倾西北，地陷东南。', '劫数难逃，唯求自保。'],
        ['黑云压城城欲摧，', '山雨欲来风满楼。'],
        ['大厦将倾，一木难支。', '万事休矣，不可挽回。'],
        ['前路已断，退路已绝。', '置之死地，或可后生。'],
        ['虎落平阳，龙困浅滩。', '暂且蛰伏，以待天时。'],
        ['风萧萧兮易水寒，', '壮士一去兮不复还。'],
      ],
      readings: [
        '诸事不宜，建议今天什么都别干。',
        '祸不单行，注意人身和财物安全。',
        '塞翁失马，焉知非福？最坏的时刻也许是转折的起点。',
        '不宜做任何重要决定，静待时机。',
      ]
    }
  ];

  // DOM
  var stage = document.getElementById('fortuneStage');
  var bg = document.getElementById('fortuneBg');
  var placeholder = document.getElementById('fortunePlaceholder');
  var levelEl = document.getElementById('fortuneLevel');
  var levelLabel = document.getElementById('fortuneLevelLabel');
  var poemEl = document.getElementById('fortunePoem');
  var readingEl = document.getElementById('fortuneReading');
  var dateEl = document.getElementById('fortuneDate');
  var btn = document.getElementById('fortuneBtn');

  var isDrawing = false;
  var clearBtn = document.getElementById('fortuneClearBtn');

  // 每日锁
  var FORTUNE_KEY = 'fortune_today';

  function getDateStr() {
    var d = new Date();
    return d.getFullYear() + '-' + (d.getMonth()+1) + '-' + d.getDate();
  }

  function checkTodayDone() {
    return localStorage.getItem(FORTUNE_KEY) === getDateStr();
  }

  function markTodayDone() {
    localStorage.setItem(FORTUNE_KEY, getDateStr());
    btn.classList.add('done');
    btn.textContent = '✦ 今日已抽';
    btn.disabled = true;
  }

  // 清除记录
  clearBtn.addEventListener('click', function() {
    if (!confirm('确定清除今日抽签记录？重新抽签会覆盖今日结果。')) return;
    localStorage.removeItem(FORTUNE_KEY);
    btn.classList.remove('done');
    btn.textContent = '✦ 抽一签';
    btn.disabled = false;
    // 重置显示
    stage.className = 'fortune-stage';
    placeholder.style.display = 'block';
    levelEl.textContent = '';
    levelLabel.textContent = '';
    poemEl.innerHTML = '';
    readingEl.textContent = '';
    dateEl.textContent = '';
    bg.style.backgroundImage = '';
  });

  // 取今日签文（每天固定，不重复抽取）
  function getTodaySeed() {
    var d = new Date();
    return d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
  }

  // 简单的伪随机（基于日期种子）
  function seededRandom(seed) {
    var x = Math.sin(seed * 9301 + 49297) * 49297;
    return x - Math.floor(x);
  }

  function drawFortune() {
    if (isDrawing) return;
    isDrawing = true;
    btn.disabled = true;

    // 抖动动画
    stage.classList.remove('show', 'shaking');
    void stage.offsetWidth;
    stage.classList.add('shaking');

    // 延迟后显示结果
    setTimeout(function() {
      var seed = getTodaySeed();
      var r = seededRandom(seed);

      // 决定命运等级
      var cum = 0;
      var chosen = FORTUNES[FORTUNES.length - 1];
      for (var i = 0; i < FORTUNES.length; i++) {
        cum += FORTUNES[i].chance;
        if (r < cum) { chosen = FORTUNES[i]; break; }
      }

      // 选诗句
      var pi = Math.floor(seededRandom(seed + 1) * chosen.poems.length);
      var poemLines = chosen.poems[pi];

      // 选解读
      var ri = Math.floor(seededRandom(seed + 2) * chosen.readings.length);
      var reading = chosen.readings[ri];

      // 移除旧 class 并设置新 class
      stage.className = 'fortune-stage level-' + chosen.key + ' show';

      // 背景
      bg.style.backgroundImage = 'url(' + chosen.bg + ')';
      stage.classList.add('has-bg');

      // 内容
      levelEl.textContent = chosen.level;
      levelLabel.textContent = '— ' +  ['大吉','中吉','中平','凶','大凶'][['da-ji','zhong-ji','zhong-ping','xiong','da-xiong'].indexOf(chosen.key)] + ' —';

      poemEl.innerHTML = '';
      poemLines.forEach(function(line) {
        var span = document.createElement('span');
        span.className = 'line';
        span.textContent = line;
        poemEl.appendChild(span);
      });

      readingEl.textContent = '▸ ' + reading;

      // 日期
      var d = new Date();
      var ds = d.getFullYear() + '年' + (d.getMonth()+1) + '月' + d.getDate() + '日';
      dateEl.textContent = '—— ' + ds + ' 所获 ——';

      markTodayDone();
      isDrawing = false;
      btn.disabled = false;
    }, 700);
  }

  btn.addEventListener('click', function() {
    if (checkTodayDone()) {
      btn.classList.add('done');
      btn.textContent = '✦ 今日已抽';
      btn.disabled = true;
      return;
    }
    drawFortune();
  });

  // 如果今日已抽过，禁用按钮
  if (checkTodayDone()) {
    btn.classList.add('done');
    btn.textContent = '✦ 今日已抽';
    btn.disabled = true;
  } else {
    // 自动抽今日第一签
    drawFortune();
  }
})();
</script>
