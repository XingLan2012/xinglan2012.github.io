<style>
  .fortune-wrap {
    max-width: 600px;
    margin: 0 auto;
    padding: 30px 0 20px;
    text-align: center;
  }
  .fortune-title {
    font-size: 24px;
    color: #ffd700;
    letter-spacing: 8px;
    font-weight: 300;
    margin-bottom: 4px;
  }
  .fortune-sub {
    font-size: 12px;
    color: rgba(255,215,0,0.3);
    letter-spacing: 3px;
    margin-bottom: 30px;
  }

  /* 签文显示区 */
  .fortune-stage {
    position: relative;
    width: 280px;
    min-height: 360px;
    margin: 0 auto 24px;
    padding: 40px 28px 32px;
    background: rgba(10,14,39,0.6);
    border: 1px solid rgba(255,215,0,0.08);
    border-radius: 18px;
    box-shadow: 0 0 40px rgba(0,0,0,0.3), inset 0 0 60px rgba(255,215,0,0.02);
    transition: all 0.5s ease;
    overflow: hidden;
  }
  .fortune-bg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-size: cover;
    background-position: center;
    opacity: 0.08;
    transition: opacity 0.8s ease;
    pointer-events: none;
  }
  .fortune-stage.has-bg .fortune-bg { opacity: 0.15; }
  .fortune-level {
    position: relative;
    z-index: 1;
    font-size: 52px;
    letter-spacing: 6px;
    font-weight: 300;
    margin-bottom: 6px;
    opacity: 0;
    transform: scale(0.5);
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .fortune-stage.show .fortune-level {
    opacity: 1;
    transform: scale(1);
  }
  .level-da-ji .fortune-level { color: #ffd700; text-shadow: 0 0 40px rgba(255,215,0,0.3); }
  .level-zhong-ji .fortune-level { color: #5b9bd5; text-shadow: 0 0 30px rgba(91,155,213,0.2); }
  .level-zhong-ping .fortune-level { color: rgba(255,255,255,0.5); }
  .level-xiong .fortune-level { color: #cc8844; text-shadow: 0 0 20px rgba(204,136,68,0.15); }
  .level-da-xiong .fortune-level { color: #884444; text-shadow: 0 0 20px rgba(136,68,68,0.15); }
  .fortune-level-label {
    position: relative;
    z-index: 1;
    font-size: 11px;
    letter-spacing: 4px;
    opacity: 0;
    transition: opacity 0.6s 0.2s ease;
    margin-bottom: 20px;
  }
  .fortune-stage.show .fortune-level-label { opacity: 0.5; }
  .fortune-poem {
    position: relative;
    z-index: 1;
    font-size: 13px;
    line-height: 2;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.75);
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.6s 0.3s ease;
  }
  .fortune-stage.show .fortune-poem { opacity: 1; transform: translateY(0); }
  .fortune-poem .line { display: block; }
  .fortune-reading {
    position: relative;
    z-index: 1;
    margin-top: 16px;
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 1px;
    line-height: 1.8;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.6s 0.4s ease;
  }
  .fortune-stage.show .fortune-reading { opacity: 1; transform: translateY(0); }
  .fortune-date {
    position: relative;
    z-index: 1;
    margin-top: 18px;
    font-size: 10px;
    color: rgba(255,255,255,0.15);
    letter-spacing: 2px;
    opacity: 0;
    transition: opacity 0.5s 0.5s ease;
  }
  .fortune-stage.show .fortune-date { opacity: 1; }
  .fortune-placeholder {
    position: relative;
    z-index: 1;
    font-size: 14px;
    color: rgba(255,215,0,0.2);
    letter-spacing: 4px;
  }
  .fortune-stage.show .fortune-placeholder { display: none; }

  /* 按钮 */
  .fortune-actions {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 30px;
  }
  .fortune-btn {
    padding: 12px 52px;
    border: 1.5px solid rgba(255,215,0,0.25);
    border-radius: 30px;
    color: #ffd700;
    font-size: 14px;
    letter-spacing: 4px;
    cursor: pointer;
    background: rgba(255,215,0,0.03);
    transition: all 0.3s ease;
    user-select: none;
    font-family: inherit;
  }
  .fortune-btn:hover {
    background: rgba(255,215,0,0.08);
    border-color: #ffd700;
    box-shadow: 0 0 24px rgba(255,215,0,0.06);
  }
  .fortune-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .fortune-btn.done {
    opacity: 0.5;
    border-color: rgba(255,215,0,0.1);
    cursor: default;
  }
  .fortune-btn.done:hover {
    background: rgba(255,215,0,0.03);
    box-shadow: none;
  }
  .fortune-clear {
    padding: 10px 20px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    color: rgba(255,255,255,0.25);
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
    background: transparent;
    transition: all 0.3s ease;
    font-family: inherit;
  }
  .fortune-clear:hover { color: rgba(255,100,100,0.6); border-color: rgba(255,100,100,0.2); }

  /* 概率 */
  .fortune-rates {
    max-width: 360px;
    margin: 0 auto;
    padding: 14px 18px;
    background: rgba(255,215,0,0.02);
    border: 1px solid rgba(255,215,0,0.05);
    border-radius: 10px;
  }
  .fortune-rates-title {
    font-size: 11px;
    color: rgba(255,215,0,0.25);
    letter-spacing: 2px;
    margin-bottom: 6px;
  }
  .fortune-rate-row {
    display: flex;
    justify-content: space-between;
    padding: 2px 0;
    font-size: 11px;
  }
  .fortune-rate-row .lbl { color: rgba(255,255,255,0.3); }
  .fortune-rate-row .val { letter-spacing: 1px; }
  .rate-dj .val { color: #ffd700; }
  .rate-zj .val { color: #5b9bd5; }
  .rate-zp .val { color: rgba(255,255,255,0.4); }
  .rate-x .val { color: #cc8844; }
  .rate-dx .val { color: #884444; }

  @keyframes fortuneShake {
    0%, 100% { transform: translate(0); }
    10% { transform: translate(-4px, 2px); }
    20% { transform: translate(4px, -2px); }
    30% { transform: translate(-3px, 3px); }
    40% { transform: translate(3px, -1px); }
    50% { transform: translate(-2px, 1px); }
    60% { transform: translate(2px, -3px); }
    70% { transform: translate(-1px, 2px); }
    80% { transform: translate(3px, -2px); }
    90% { transform: translate(-2px, 1px); }
  }
  .fortune-stage.shaking { animation: fortuneShake 0.6s ease-out; }
</style>

<script>
var FORTUNES = [
  { key:'da-ji', label:'大吉', level:'大吉', chance:0.12, bg:'/assets/images/bg/bg1.png',
    poems:[['星河灿烂，天地清朗。','万事皆宜，诸般顺遂。'],['长风破浪，直挂云帆。','前路光明，莫问归期。'],['春回大地，万象更新。','花开有时，好事将近。'],['凤鸣高岗，龙腾九霄。','此行不虚，必有所成。'],['日升月恒，天赐良缘。','随心而动，自得圆满。'],['云开见日，水到渠成。','一切所求，皆如所愿。']],
    readings:['今日天时地利，宜大胆行动。','好运正在降临，请保持期待。','诸事顺遂，所行皆坦途。','万物向荣，正是好时节。'] },
  { key:'zhong-ji', label:'中吉', level:'中吉', chance:0.28, bg:'/assets/images/bg/bg2.png',
    poems:[['山重水复，柳暗花明。','虽有波折，终见坦途。'],['月有阴晴，事有缓急。','稍安勿躁，自有其时。'],['逆水行舟，不进则退。','勉力为之，可保无虞。'],['老树新芽，枯木逢春。','否极泰来，运道渐昌。'],['行到水穷处，坐看云起时。','耐心等待，转机将至。'],['事虽小，不为不成。','路虽近，不行不至。']],
    readings:['整体运势不错，一些小波折无伤大雅。','耐心一些，好运会慢慢靠近。','适合作出计划，但不宜操之过急。','事情正在朝好的方向发展。'] },
  { key:'zhong-ping', label:'中平', level:'中平', chance:0.35, bg:'/assets/images/bg/bg3.png',
    poems:[['风平浪静，波澜不惊。','平平淡淡，亦是真味。'],['不雨花犹落，无风絮自飞。','顺其自然，随遇而安。'],['白云苍狗，世事无常。','守得本心，便是晴天。'],['万事随缘，不可强求。','得之我幸，失之我命。'],['日日是好日，年年是好年。','平常心是道。'],['不急不躁，不悲不喜。','静水流深，暗香浮动。']],
    readings:['今日运势平稳，适合按部就班。','没有好消息也没有坏消息，就是最好的消息。','保持平常心，不急不躁。','平淡的一天，适合休养生息。'] },
  { key:'xiong', label:'凶', level:'凶', chance:0.18, bg:'/assets/images/bg/bg2.png',
    poems:[['乌云蔽日，前路难明。','宜静不宜动，宜守不宜攻。'],['屋漏偏逢连夜雨，船迟又遇打头风。','诸事不顺，且自谨慎。'],['覆巢之下，安有完卵。','大势如此，莫要强求。'],['前有悬崖，后有追兵。','进退维谷，当思良策。'],['风波起于青萍之末，','祸患藏于微末之间。'],['举步维艰，动辄得咎。','忍一时之气，免百日之忧。']],
    readings:['今日运势不佳，建议低调行事。','宜静不宜动，等待时机。','小心防备，避免冲动决策。','祸兮福所倚，坏事也可能变好事。'] },
  { key:'da-xiong', label:'大凶', level:'大凶', chance:0.07, bg:'/assets/images/bg/bg1.png',
    poems:[['天倾西北，地陷东南。','劫数难逃，唯求自保。'],['黑云压城城欲摧，','山雨欲来风满楼。'],['大厦将倾，一木难支。','万事休矣，不可挽回。'],['前路已断，退路已绝。','置之死地，或可后生。'],['虎落平阳，龙困浅滩。','暂且蛰伏，以待天时。'],['风萧萧兮易水寒，','壮士一去兮不复还。']],
    readings:['诸事不宜，建议今天什么都别干。','祸不单行，注意人身和财物安全。','塞翁失马焉知非福？最坏的时刻也许是转折的起点。','不宜做任何重要决定，静待时机。'] }
];

(function(){
  var stage=document.getElementById('fortuneStage'),bg=document.getElementById('fortuneBg'),
      placeholder=document.getElementById('fortunePlaceholder'),levelEl=document.getElementById('fortuneLevel'),
      levelLabel=document.getElementById('fortuneLevelLabel'),poemEl=document.getElementById('fortunePoem'),
      readingEl=document.getElementById('fortuneReading'),dateEl=document.getElementById('fortuneDate'),
      btn=document.getElementById('fortuneBtn'),clearBtn=document.getElementById('fortuneClearBtn');
  var isDrawing=false, FK='fortune_today', FDK='fortune_data';
  function ds(){var d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
  function todayDone(){return localStorage.getItem(FK)===ds();}
  function markDone(){
    localStorage.setItem(FK,ds());btn.classList.add('done');btn.textContent='✦ 今日已抽';btn.disabled=true;
  }
  function saveData(c,p,r){
    try{localStorage.setItem(FDK,JSON.stringify({date:ds(),key:c.key,level:c.level,bg:c.bg,poemLines:p,reading:r}));}catch(e){}
  }
  function loadData(){
    try{
      var raw=localStorage.getItem(FDK);if(!raw)return false;
      var d=JSON.parse(raw);if(d.date!==ds()){localStorage.removeItem(FDK);return false;}
      stage.className='fortune-stage level-'+d.key+' show has-bg';
      bg.style.backgroundImage='url('+d.bg+')';
      levelEl.textContent=d.level;
      levelLabel.textContent='— '+['大吉','中吉','中平','凶','大凶'][['da-ji','zhong-ji','zhong-ping','xiong','da-xiong'].indexOf(d.key)]+' —';
      poemEl.innerHTML='';d.poemLines.forEach(function(l){var s=document.createElement('span');s.className='line';s.textContent=l;poemEl.appendChild(s);});
      readingEl.textContent='▸ '+d.reading;
      var dd=new Date();dateEl.textContent='—— '+dd.getFullYear()+'年'+(dd.getMonth()+1)+'月'+dd.getDate()+'日 所获 ——';
      placeholder.style.display='none';
      setTimeout(spawnParticles,300);return true;
    }catch(e){return false;}
  }
  var PC={
    'da-ji':['#ffd700','#ffec8b','#fff4c2','#ffaa33'],
    'zhong-ji':['#5b9bd5','#88ccff','#aaddff'],
    'zhong-ping':['rgba(255,255,255,0.4)','rgba(200,200,200,0.3)'],
    'xiong':['#cc8844','#dd9966','#bb7744'],
    'da-xiong':['#884444','#aa5555','#663333']
  };
  function spawnParticles(){
    var r=stage.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2;
    var k='';stage.className.split(' ').forEach(function(c){if(c.indexOf('level-')===0)k=c.replace('level-','');});
    var colors=PC[k]||['#ffd700','#ffec8b'],sym=['✦','✧','⋆','·','✶','⁕'];
    for(var i=0;i<40;i++){(function(){
      var e=document.createElement('div');
      e.style.cssText='position:fixed;pointer-events:none;z-index:9999;font-size:'+(Math.random()*14+10)+'px;color:'+colors[Math.floor(Math.random()*colors.length)]+';text-shadow:0 0 20px currentColor;left:'+(cx+(Math.random()-0.5)*60)+'px;top:'+(cy+(Math.random()-0.5)*60)+'px;opacity:1;transition:all '+(Math.random()*0.6+0.8)+'s ease-out;';
      e.textContent=sym[Math.floor(Math.random()*sym.length)];
      document.body.appendChild(e);
      requestAnimationFrame(function(){requestAnimationFrame(function(){var a=Math.random()*2*Math.PI,d=Math.random()*180+60;e.style.transform='translate('+Math.cos(a)*d+'px,'+(Math.sin(a)*d-30)+'px)';e.style.opacity='0';});});
      setTimeout(function(){e.remove();},2000);
    })();}
    for(var j=0;j<2;j++){(function(){
      var ring=document.createElement('div');
      ring.style.cssText='position:fixed;pointer-events:none;z-index:9998;border-radius:50%;border:2px solid '+colors[0]+';box-shadow:0 0 40px '+colors[0]+',inset 0 0 40px '+colors[0]+';left:'+(cx-20)+'px;top:'+(cy-20)+'px;width:40px;height:40px;opacity:0.8;transition:all 1s ease-out;';
      document.body.appendChild(ring);
      requestAnimationFrame(function(){requestAnimationFrame(function(){ring.style.transform='scale(5)';ring.style.opacity='0';});});
      setTimeout(function(){ring.remove();},1500);
    })();}
  }
  function seed(){var d=new Date();return d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();}
  function srand(s){var x=Math.sin(s*9301+49297)*49297;return x-Math.floor(x);}
  function draw(){
    if(isDrawing)return;isDrawing=true;btn.disabled=true;
    stage.classList.remove('show','shaking');void stage.offsetWidth;stage.classList.add('shaking');
    setTimeout(function(){
      var s=seed(),r=srand(s),cum=0,chosen=FORTUNES[FORTUNES.length-1];
      for(var i=0;i<FORTUNES.length;i++){cum+=FORTUNES[i].chance;if(r<cum){chosen=FORTUNES[i];break;}}
      var pi=Math.floor(srand(s+1)*chosen.poems.length),poemLines=chosen.poems[pi];
      var ri=Math.floor(srand(s+2)*chosen.readings.length),reading=chosen.readings[ri];
      stage.className='fortune-stage level-'+chosen.key+' show has-bg';
      bg.style.backgroundImage='url('+chosen.bg+')';
      levelEl.textContent=chosen.level;
      levelLabel.textContent='— '+['大吉','中吉','中平','凶','大凶'][['da-ji','zhong-ji','zhong-ping','xiong','da-xiong'].indexOf(chosen.key)]+' —';
      poemEl.innerHTML='';poemLines.forEach(function(l){var s=document.createElement('span');s.className='line';s.textContent=l;poemEl.appendChild(s);});
      readingEl.textContent='▸ '+reading;
      var d2=new Date();dateEl.textContent='—— '+d2.getFullYear()+'年'+(d2.getMonth()+1)+'月'+d2.getDate()+'日 所获 ——';
      saveData(chosen,poemLines,reading);markDone();spawnParticles();
      isDrawing=false;btn.disabled=false;
    },700);
  }
  btn.addEventListener('click',function(){if(todayDone())return;draw();});
  clearBtn.addEventListener('click',function(){
    if(!confirm('确定清除今日抽签记录？重新抽签会覆盖今日结果。'))return;
    localStorage.removeItem(FK);localStorage.removeItem(FDK);
    btn.classList.remove('done');btn.textContent='✦ 抽一签';btn.disabled=false;
    stage.className='fortune-stage';placeholder.style.display='block';
    levelEl.textContent='';levelLabel.textContent='';poemEl.innerHTML='';readingEl.textContent='';dateEl.textContent='';bg.style.backgroundImage='';
  });
  if(todayDone()){
    btn.classList.add('done');btn.textContent='✦ 今日已抽';btn.disabled=true;
    if(!loadData()){localStorage.removeItem(FK);btn.classList.remove('done');btn.textContent='✦ 抽一签';btn.disabled=false;draw();}
  }else{draw();}
})();
</script>
